name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest + ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Ruff
        run: ruff check custom_components tests converter support
      - name: Mypy
        run: mypy
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=custom_components.modbus_connect \
            --cov-report=term-missing \
            --cov-fail-under=95
