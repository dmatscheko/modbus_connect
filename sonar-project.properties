# SonarQube analysis scope for Modbus Connect.
#
# Only custom_components/ is shipped to users. converter/ (a one-shot
# migration CLI) and support/ (brand-asset build and manual test scripts) are
# local developer tooling: operating on developer-supplied file paths is
# their entire purpose, which the path-injection rules flag by design, and
# the converter deliberately keeps the legacy conversion rules in a few long
# functions rather than churning frozen logic.

sonar.sources=custom_components,.github
sonar.tests=tests
sonar.exclusions=converter/**,support/**

# Deliberate, documented exceptions kept out of the rating:
sonar.issue.ignore.multicriteria=e1

# githubactions:S7637 wants actions pinned to a full commit SHA. hassfest and
# the HACS validator are living validators without releases, documented to be
# used from master/main; a pinned SHA would freeze Home Assistant's
# validation rules and silently rot (see the comments in the workflows).
sonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.e1.resourceKey=.github/workflows/*.yml
