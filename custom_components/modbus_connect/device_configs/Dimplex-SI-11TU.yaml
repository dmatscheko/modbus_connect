      0: Sommer
      1: Auto
      2: Urlaub
      3: Party
      4: 2.Wärmeerzeuger
      5: Kühlen
    ha:
      platform: select
      name: Betriebsmodus
      icon: mdi:cog
  heating_parallel_shift:
    address: 5036
    map:
      0: -19 °C
      1: -18 °C
      2: -17 °C
      3: -16 °C
      4: -15 °C
      5: -14 °C
      6: -13 °C
      7: -12 °C
      8: -11 °C
      9: -10 °C
      10: -9 °C
      11: -8 °C
      12: -7 °C
      13: -6 °C
      14: -5 °C
      15: -4 °C
      16: -3 °C
      17: -2 °C
      18: -1 °C
      19: 0 °C
      20: 1 °C
      21: 2 °C
      22: 3 °C
      23: 4 °C
      24: 5 °C
      25: 6 °C
      26: 7 °C
      27: 8 °C
      28: 9 °C
      29: 10 °C
      30: 11 °C
      31: 12 °C
      32: 13 °C
      33: 14 °C
      34: 15 °C
      35: 16 °C
      36: 17 °C
      37: 18 °C
      38: 19 °C
    ha:
      platform: select
      name: Heizung Parallelverschiebung
      icon: mdi:home-thermometer-outline
      entity_category: config
      enabled_by_default: false
  heating_room_temperature:
    address: 46
    ha:
      platform: number
      min: 15
      max: 30
      name: Heizung Raumtemperatur
      unit_of_measurement: °C
      icon: mdi:home-thermometer-outline
      entity_category: config
      enabled_by_default: false
  heating_fixed_target:      # setpoint owned by the Heizung climate entity (see template:)
    address: 5037
    internal: true
  heating_curve_end_point:
    address: 5038
    ha:
      platform: number
      min: 20
      max: 70
      name: Heizung Heizkurvenendpunkt
      unit_of_measurement: °C
      icon: mdi:home-thermometer-outline
      entity_category: config
      enabled_by_default: false
  heating_hysteresis:
    address: 47
    multiplier: 0.1
    ha:
      platform: number
      min: 0.5
      max: 5.0
      step: 0.1
      name: Heizung Hysterese
      unit_of_measurement: K
      icon: mdi:home-thermometer-outline
      entity_category: config
      enabled_by_default: false
  external_block_software:
    address: 5130
    map:
      0: Hardwareeingang
      10: Sperre nicht aktiv
      11: Sperre aktiv
    ha:
      platform: select
      name: Softwaresperre Extern
      icon: mdi:lock
      entity_category: config
  hot_water_hysteresis:
    address: 5045
    ha:
      platform: number
      min: 2
      max: 15
      name: Warmwasser Hysterese
      unit_of_measurement: K
      icon: mdi:water-thermometer-outline
      entity_category: config
      enabled_by_default: false
  hot_water_fixed_target:      # setpoint owned by the Warmwasser climate entity (see template:)
    address: 5047
    internal: true
  hot_water_min_fixed_target:
    address: 5145
    ha:
      platform: number
      min: 10
      max: 60
      name: Warmwasser Solltemperatur Minimal
      unit_of_measurement: °C
      icon: mdi:water-thermometer-outline
      entity_category: config
      enabled_by_default: false
  hot_water_max_fixed_target:
    address: 5048
