# Template entities: thermostats composed from the device's decoded values.
template:
  warmwasser:                              # hot-water thermostat (R3 temp + fixed setpoint)
    ha:
      platform: climate
      name: Warmwasser
    current_temperature: "{{ hot_water_temp }}"
    target_temperature: "{{ hot_water_fixed_target }}"
    hvac_mode: "{{ 'heat' }}"              # no DHW on/off register — always heating
    hvac_action: "{{ 'heating' if operation_status == 'Warmwasser' else 'idle' }}"
    min_temp: 18
    max_temp: 60
    temp_step: 1
    set_temperature: {entity: hot_water_fixed_target}

  heizung:                                 # heating thermostat (flow temp + fixed setpoint)
    ha:
      platform: climate
      name: Heizung
    current_temperature: "{{ flow_temp }}"
    target_temperature: "{{ heating_fixed_target }}"
    hvac_mode: "{{ 'off' if operating_mode == 'Sommer' else 'heat' }}"
    hvac_action: "{{ 'heating' if operation_status == 'Heizen' else 'idle' }}"
    min_temp: 18
    max_temp: 60
    temp_step: 1
    set_temperature: {entity: heating_fixed_target}
    set_hvac_mode:
      entity: operating_mode
      map: {heat: Auto, "off": Sommer}     # hvac mode -> operating_mode value written
