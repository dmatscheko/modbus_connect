# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: Growatt
  model: MIN 6000TL-XH
  max_register_read: 5

# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  hw_version:
    address: 9
    type: string
    count: 3
    ha:
      platform: sensor
      name: Firmware version
  sw_version:
    address: 12
    type: string
    count: 3
    ha:
      platform: sensor
      name: Control firmware version
  serial_no:
    address: 3001
    type: string
    count: 14
    ha:
      platform: sensor
      name: Serial Number
  on_off:
    address: 0
    on_value: 1
    off_value: 0
    ha:
      platform: switch
      name: Remote On/Off
      icon: "mdi:power"
  max_output_active:
    address: 3
    ha:
      platform: number
      name: Max output active power
      min: 0
      max: 100
      unit_of_measurement: "%"
      icon: "mdi:flash"
  language:
    address: 15
    map:
      0: Italian
      1: English
      2: German
      3: Spanish
      4: French
      5: Chinese
      6: Polish
      7: Portuguese
      8: Hungarian
    ha:
      platform: select
      name: LCD language
  com_address:
    address: 3085
    ha:
      platform: number
      name: Communicate address
      min: 1
      max: 254
      icon: "mdi:serial-port"
  GridFirstDischargePowerRate:
    address: 3036
    ha:
      platform: number
      name: Discharge Power Rate (Grid First)
      min: 1
      max: 255
      icon: "mdi:transmission-tower-export"
  GridFirstStopSOC:
    address: 3037
    ha:
      platform: number
      name: Stop Discharge SOC (Grid First)
      min: 1
      max: 100
      unit_of_measurement: "%"
      icon: "mdi:battery-negative"
  BatFirstDischargePowerRate:
    address: 3047
    ha:
      platform: number
      name: Discharge Power Rate (Bat First)
      min: 1
      max: 100
      icon: "mdi:transmission-tower-import"
  BatFirstStopSOC:
    address: 3048
    ha:
      platform: number
      name: Stop Charge SOC (Bat First)
      min: 1
      max: 100
      unit_of_measurement: "%"
      icon: "mdi:battery-charging"
  AcChargeEnable:
    address: 3049
    on_value: 1
    off_value: 0
    ha:
      platform: switch
      name: AC Charge Enable
      icon: "mdi:transmission-tower"

# Input registers: 16-bit words, read-only (Modbus FC04 read).
input:
  machine_status:
    address: 3000
    mask: 0xFF
    map:
      0: Standby
      1: Normal
      3: Fault
      4: Flash
    ha:
      platform: sensor
      name: Inverter Machine Status
  run_status:
    address: 3000
    mask: 0xFF00
    map:
      0: Waiting module
      1: Self-test
      3: SysFault module
      4: Flash module
      5: PVBATOnline module
      6: BatOnline module
      7: PVOffline mode
      8: BatOffline mode
    ha:
      platform: sensor
      name: Inverter Run Status
  Ppv:
    address: 3001
    type: uint32
    multiplier: 0.1
    ha:
      platform: sensor
      name: PV total power
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      precision: 2
  Vpv1:
    address: 3003
    multiplier: 0.1
    ha:
      platform: sensor
      name: PV1 voltage
      unit_of_measurement: V
      device_class: voltage
      state_class: measurement
      precision: 2
  PV1Curr:
    address: 3004
    multiplier: 0.1
    ha:
      platform: sensor
      name: PV1 input current
      unit_of_measurement: A
      device_class: current
      state_class: measurement
      precision: 2
