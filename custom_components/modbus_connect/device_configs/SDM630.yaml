# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  serial_num:
    address: 64512
    type: uint32
    ha:
      platform: sensor
      name: Serial Number
      precision: 0
      entity_category: diagnostic
  com_address:
    address: 20
    type: float32
    ha:
      platform: number
      name: Communicate address
      min: 1
      max: 247
      icon: "mdi:serial-port"
  baud_rate:
    address: 28
    type: float32
    map:
      0: "2400 bps"
      1: "4800 bps"
      2: "9600 bps"
      3: "19200 bps"
      4: "38400 bps"
    ha:
      platform: select
      name: Baud Rate
  unit_prefix:
    address: 30
    type: float32
    map:
      0: kWh / Ah
      1: Mwh / kAh
    ha:
      platform: select
      name: Energy Units Prefix

