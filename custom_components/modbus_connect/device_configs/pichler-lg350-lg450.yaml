# Templates: composite Home Assistant entities derived from the registers above.
template:
  ventilation:
    ha:
      platform: fan
      name: Lüftung
    groups: [basic, ventilation]
    state: "{{ ventilation_level_raw is not none and ventilation_level_raw > 0 }}"
    preset_mode: "{{ {1: 'Stufe 1', 2: 'Stufe 2', 3: 'Stufe 3', 4: 'Grundlüftung'}.get(ventilation_level_raw) }}"
    preset_modes: [Grundlüftung, Stufe 1, Stufe 2, Stufe 3]
    turn_on:
      entity: ventilation_level_raw
      value: 2
    turn_off:
      entity: ventilation_level_raw
      value: 0
    set_preset_mode:
      entity: ventilation_level_raw
      map:
        Grundlüftung: 4
        Stufe 1: 1
        Stufe 2: 2
        Stufe 3: 3
  klima:
    ha:
      platform: climate
      name: Klima
    groups: [basic, temperatures]
    current_temperature: |-
      {{ {'Zuluft': supply_air_temp,
          'Raum': extract_air_temp,
          'Abluft': extract_air_temp}.get(temperature_control_mode_select) }}
    target_temperature: |-
      {{ {'Zuluft': supply_temp_setpoint,
          'Raum': room_temp_setpoint,
          'Abluft': extract_temp_setpoint}.get(temperature_control_mode_select) }}
    hvac_mode: "{{ 'cool' if key('summer_winter_mode_select') == 1 else 'heat' }}"
    hvac_action: |-
      {{ 'idle' if current_ventilation_level not in ['Stufe 1', 'Stufe 2', 'Stufe 3', 'Grundlüftung']
         else ('cooling' if key('summer_winter_mode_select') == 1 else 'heating')
              if bypass_damper_status
         else 'fan' }}
    min_temp: 15
    max_temp: 30
    temp_step: 0.5
    set_temperature:
      by: "{{ temperature_control_mode_select }}"
      cases:
        Zuluft:
          entity: supply_temp_setpoint
        Raum:
          entity: room_temp_setpoint
        Abluft:
          entity: extract_temp_setpoint
    set_hvac_mode:
      entity: summer_winter_mode_select
      map:
        heat: Winter
        cool: Sommer

