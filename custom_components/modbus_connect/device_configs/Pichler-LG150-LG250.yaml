# Pichler Lüftungsgerät LG 150 - LG 250 — modbus_local_gateway-derived; entity groups from support/converter/Pichler-LG150-LG250/augment.yaml
# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: Pichler
  model: Lüftungsgerät LG 150 - LG 250
  max_register_read: 100
  max_read_gap: 64
  modbus_id: 20
  prefix: Pichler LG
  default_groups: [basic]
  group_labels:
    modbus_config: Modbus configuration
    co2_control: CO2 control
    humidity_control: Humidity control
    heat_exchanger: Heat exchanger / bypass
    preheater: Pre/post-heater
    defrost: Defrost / frost
    external_sensors: External sensors
    filter: Filter
    fan_control: "Fan & flow"
    firmware: Firmware / model

# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  betriebsmodus_sommer_winter_select:
    address: 1
    groups: [basic]
    map:
      1: Sommer
      2: Winter
    ha:
      platform: select
      name: Betriebsmodus Sommer/Winter
      icon: "mdi:dip-switch"
  luftungsstufe_select:
    address: 2
    groups: [basic]
    map:
      0: Standby
      1: Stufe 1
      2: Stufe 2
      3: Stufe 3
      4: Grundlüftung
    ha:
      platform: select
      name: Lüftungsstufe
      icon: "mdi:stairs"
  luftungsstufe_raw:
    address: 2
    groups: [basic]
    internal: true
  temperaturregelungsart_select:
