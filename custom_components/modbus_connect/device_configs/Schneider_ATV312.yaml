# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: Schneider Electric
  model: Altivar ATV312
  max_register_read: 8

# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  lfr_frequency_reference_via_bus:
    address: 8502
    type: int16
    multiplier: 0.1
    ha:
      platform: number
      name: LFr Frequency Reference via Bus
      min: 18.0
      max: 60.0
      step: 0.1
      mode: slider
      unit_of_measurement: Hz
      device_class: frequency
  cmd_control_word:
    address: 8501
    ha:
      platform: sensor
      name: CMD Control Word
      entity_category: config
      enabled_by_default: false
  pisp_pi_reference_via_bus:
    address: 8503
    multiplier: 0.1
    ha:
      platform: number
      name: PISP PI Reference via Bus
      min: 0.0
      max: 100.0
      step: 0.1
      unit_of_measurement: "%"
      entity_category: config
