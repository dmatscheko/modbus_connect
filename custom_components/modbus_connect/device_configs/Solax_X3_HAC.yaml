# Generated from homeassistant-solax-modbus by solax_convert.py — review before use.
device:
  manufacturer: SolaX Power
  model: X3-HAC (11 kW)
  max_register_read: 32
  prefix: solax_x3_hac
  sw_version: "ARM v{{ '%.2f' | format(firmware_version / 100) }}"
  hw_version: Gen2

holding:
  firmware_version:
    address: 37
    internal: true
  meter_setting:
    address: 1548
    map:
      0: External CT
      1: External Meter
      2: Inverter
    ha:
      platform: select
      name: Meter Setting
      entity_category: config
  charger_use_mode:
    address: 1549
    map:
      0: Stop
      1: Fast
      2: ECO
      3: Green
    ha:
      platform: select
      name: Charger Use Mode
  eco_gear:
    address: 1550
    map:
      1: "6A"
      2: "10A"
      3: "16A"
      4: "20A"
      5: "25A"
    ha:
      platform: select
      name: ECO Gear
      entity_category: config
  green_gear:
    address: 1551
    map:
      1: "3A"
      2: "6A"
    ha:
      platform: select
      name: Green Gear
      entity_category: config
  start_charge_mode:
    address: 1552
    map:
      0: Plug and Charge
      1: Swipe Card to Start
      2: App Start
    ha:
      platform: select
      name: Start Charge Mode
      entity_category: config
  overload_limit:
    address: 1553
    ha:
      platform: number
      name: Overload Limit
      device_class: voltage
      unit_of_measurement: V
      entity_category: config
      min: 260
      max: 300
      step: 1
  undervoltage_limit:
    address: 1554
    ha:
      platform: number
      name: Undervoltage Limit
      device_class: voltage
      unit_of_measurement: V
      entity_category: config
      min: 80
      max: 160
      step: 1
  boost_mode:
    address: 1555
    map:
      0: Normal
      1: Timer Boost
      2: Smart Boost
    ha:
      platform: select
      name: Boost Mode
  main_breaker_limit:
    address: 1556
    ha:
      platform: number
      name: Main Breaker Limit
      device_class: current
      unit_of_measurement: A
      entity_category: config
      min: 11
      max: 300
      step: 1
  device_lock:
    address: 1557
    map:
      0: Unlock
      1: Lock
    ha:
      platform: select
      name: Device Lock
      entity_category: config
  rfid_program:
    address: 1558
    map:
      0: Disabled
      1: Enabled
    ha:
      platform: select
      name: RFID Card Activation
      entity_category: config
  charge_added_total:
    address: 1561
    type: uint32
    swap: word
    multiplier: 0.1
    ha:
      platform: sensor
      name: Charge Added Total
      device_class: energy
      state_class: total_increasing
      unit_of_measurement: kWh
      precision: 1
  evse_scene:
    address: 1564
    map:
      0: PV Mode
      1: Standard Mode
      2: OCPP Mode
    ha:
      platform: select
      name: Charging Mode
      entity_category: config
  charge_phase:
    address: 1573
    map:
      0: Three Phase
      1: L1 Phase
      2: L2 Phase
      3: L3 Phase
    ha:
      platform: select
      name: Charge Phase
      entity_category: config
  control_command:
    address: 1575
    map:
      0: No Command
      1: Available
      2: Unavailable
      3: Stop Charging
      4: Start Charging
      5: Reserve
      6: Cancel the Reservation
    ha:
      platform: select
      name: Control Command
  charge_current:
    address: 1576
    multiplier: 0.01
    ha:
      platform: number
      name: Charge Current
      device_class: current
      unit_of_measurement: A
      min: 6
      max: 32
      step: 0.1
  smart_boost_energy:
    address: 1594
    ha:
      platform: number
      name: Smart Boost Energy
      device_class: energy
      unit_of_measurement: kWh
      entity_category: config
      min: 0
      max: 200
      step: 1
  charge_phase_alt:
    address: 1595
