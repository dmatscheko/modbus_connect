# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: SolaX Power
  model: X3-HAC (11 kW)
  max_register_read: 32
  max_read_gap: 64
  scan_interval: 30
  prefix: Solax X3-HAC
  sw_version: "ARM v{{ '%.2f' | format(firmware_version / 100) }}"
  hw_version: Gen2
  default_groups: [basic]

# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  meter_setting:
    address: 1548
    groups: [advanced]
    map:
      0: External CT
      1: External Meter
      2: Inverter
    ha:
      platform: select
      name: Meter Setting
      icon: "mdi:meter-electric"
      entity_category: config
  charger_use_mode:
    address: 1549
    groups: [basic]
    map:
      0: Stop
      1: Fast
      2: ECO
      3: Green
    ha:
      platform: select
      name: Charger Use Mode
      icon: "mdi:dip-switch"
  eco_gear:
    address: 1550
    groups: [advanced]
    map:
      1: "6A"
      2: "10A"
      3: "16A"
      4: "20A"
      5: "25A"
    ha:
      platform: select
      name: ECO Gear
      icon: "mdi:dip-switch"
      entity_category: config
  green_gear:
    address: 1551
    groups: [advanced]
    map:
      1: "3A"
      2: "6A"
    ha:
      platform: select
      name: Green Gear
      icon: "mdi:dip-switch"
      entity_category: config
  start_charge_mode:
    address: 1552
    groups: [advanced]
    map:
      0: Plug and Charge
      1: Swipe Card to Start
      2: App Start
    ha:
      platform: select
      name: Start Charge Mode
      icon: "mdi:lock"
      entity_category: config
  overload_limit:
    address: 1553
    groups: [advanced]
    ha:
      platform: number
      name: Overload Limit
      min: 260
      max: 300
      step: 1
      unit_of_measurement: V
      device_class: voltage
      entity_category: config
  undervoltage_limit:
    address: 1554
    groups: [advanced]
    ha:
      platform: number
      name: Undervoltage Limit
      min: 80
      max: 160
      step: 1
      unit_of_measurement: V
      device_class: voltage
      entity_category: config
  boost_mode:
    address: 1555
    groups: [advanced]
    map:
      0: Normal
      1: Timer Boost
      2: Smart Boost
    ha:
      platform: select
      name: Boost Mode
      icon: "mdi:dip-switch"
  main_breaker_limit:
    address: 1556
    groups: [advanced]
    ha:
      platform: number
      name: Main Breaker Limit
      min: 11
      max: 300
      step: 1
      unit_of_measurement: A
      device_class: current
      entity_category: config
  device_lock:
    address: 1557
    groups: [basic]
    map:
      0: Unlock
      1: Lock
    ha:
      platform: select
      name: Device Lock
      icon: "mdi:lock"
      entity_category: config
  rfid_program:
    address: 1558
    groups: [advanced]
    map:
      0: Disabled
      1: Enabled
    ha:
      platform: select
      name: RFID Card Activation
      icon: "mdi:card-account-details"
      entity_category: config
  charge_added_total:
    address: 1561
    type: uint32
    swap: word
    multiplier: 0.1
    groups: [advanced]
    ha:
      platform: sensor
      name: Charge Added Total
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing
      precision: 1
  evse_scene:
    address: 1564
    groups: [advanced]
    map:
      0: PV Mode
      1: Standard Mode
      2: OCPP Mode
    ha:
      platform: select
      name: Charging Mode
      icon: "mdi:dip-switch"
      entity_category: config
  sync_rtc:
    address: 1565
    write_value:
      - "{{ ((now().utcoffset().total_seconds() // 60) | int) % 65536 }}"
      - "{{ utcnow().second }}"
      - "{{ utcnow().minute }}"
      - "{{ utcnow().hour }}"
      - "{{ utcnow().day }}"
      - "{{ utcnow().month }}"
      - "{{ utcnow().year % 100 }}"
    groups: [advanced]
    ha:
      platform: button
      name: Sync RTC
      icon: "mdi:home-clock"
      entity_category: config
  rtc_tz:
    address: 1565
    internal: true
  rtc_second:
    address: 1566
    internal: true
  rtc_minute:
    address: 1567
    internal: true
  rtc_hour:
    address: 1568
    internal: true
  rtc_day:
    address: 1569
    internal: true
  rtc_month:
    address: 1570
    internal: true
  rtc_year:
    address: 1571
    internal: true
  charge_phase:
    address: 1573
    groups: [advanced]
    map:
      0: Three Phase
      1: L1 Phase
      2: L2 Phase
      3: L3 Phase
    ha:
      platform: select
      name: Charge Phase
      icon: "mdi:dip-switch"
      entity_category: config
  control_command:
    address: 1575
    groups: [advanced]
    map:
      0: No Command
      1: Available
      2: Unavailable
      3: Stop Charging
      4: Start Charging
      5: Reserve
      6: Cancel the Reservation
    ha:
      platform: select
      name: Control Command
      icon: "mdi:dip-switch"
  charge_current:
    address: 1576
    multiplier: 0.01
    groups: [basic]
    ha:
      platform: number
      name: Charge Current
      min: 6
      max: 32
      step: 0.1
      unit_of_measurement: A
      device_class: current
  timer_boost_start_time:
    address: 1588
    type: time
    count: 2
    rectify_time: true
    groups: [advanced]
    ha:
      platform: time
      name: Timer Boost Start Time
      icon: "mdi:clock-start"
      entity_category: config
  timer_boost_end_time:
    address: 1590
    type: time
    count: 2
    rectify_time: true
    groups: [advanced]
    ha:
      platform: time
      name: Timer Boost End Time
      icon: "mdi:clock-end"
      entity_category: config
  smart_boost_end_time:
    address: 1592
    type: time
    count: 2
    rectify_time: true
    groups: [advanced]
    ha:
      platform: time
      name: Smart Boost End Time
      icon: "mdi:clock-end"
      entity_category: config
  smart_boost_energy:
    address: 1594
    groups: [advanced]
    ha:
      platform: number
      name: Smart Boost Energy
      min: 0
      max: 200
      step: 1
      unit_of_measurement: kWh
      device_class: energy
      entity_category: config
  charge_phase_alt:
    address: 1595
    map:
      0: Three Phase
      1: L1 Phase
      2: L2 Phase
      3: L3 Phase
    ha:
      platform: select
      name: Charge Phase Alt
      icon: "mdi:dip-switch"
      entity_category: config
      enabled_by_default: false
  modbus_address:
    address: 1600
    groups: [advanced]
    ha:
      platform: number
      name: Modbus Address
      min: 1
      max: 247
      step: 1
      icon: "mdi:identifier"
      entity_category: config
  max_charge_current:
    address: 1640
    multiplier: 0.01
    groups: [advanced]
    ha:
      platform: number
      name: Max Charge Current
      min: 6
      max: 32
      step: 0.1
      unit_of_measurement: A
      device_class: current
  evse_mode:
    address: 1641
    groups: [advanced]
    map:
      0: Fast
      1: ECO
      2: Green
    ha:
      platform: select
      name: EVSE Mode
      icon: "mdi:dip-switch"
      entity_category: config

