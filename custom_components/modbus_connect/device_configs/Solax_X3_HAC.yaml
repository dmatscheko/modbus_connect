      0: Three Phase
      1: L1 Phase
      2: L2 Phase
      3: L3 Phase
    ha:
      platform: select
      name: Charge Phase Alt
      entity_category: config
      enabled_by_default: false
  modbus_address:
    address: 1600
    ha:
      platform: number
      name: Modbus Address
      entity_category: config
      min: 1
      max: 247
      step: 1
  max_charge_current:
    address: 1640
    multiplier: 0.01
    ha:
      platform: number
      name: Max Charge Current
      device_class: current
      unit_of_measurement: A
      min: 6
      max: 32
      step: 0.1
