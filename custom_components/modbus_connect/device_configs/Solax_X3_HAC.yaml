# Templates: composite Home Assistant entities derived from the registers above.
template:
  rtc:
    ha:
      platform: sensor
      name: RTC
      icon: "mdi:clock"
      entity_category: diagnostic
      enabled_by_default: false
    state: "{% set tz = rtc_tz - 65536 if rtc_tz > 32767 else rtc_tz %}{{ '20%02d-%02d-%02d %02d:%02d:%02d UTC%s%02d:%02d' | format(rtc_year, rtc_month, rtc_day, rtc_hour, rtc_minute, rtc_second, '+' if tz >= 0 else '-', (tz | abs) // 60, (tz | abs) % 60) }}"

# Translations: per-language text for this device's human-facing strings (device model, group labels, entity names, map/flag values), keyed by the source string.
translations:
  External CT:
    de: Externer CT
    en: External CT
  External Meter:
    de: Externer Zähler
    en: External Meter
  Inverter:
    de: Wechselrichter
    en: Inverter
  Stop:
    de: Stopp
    en: Stop
  Fast:
    de: Schnell
    en: Fast
  Green:
    de: Grün
    en: Green
  Plug and Charge:
    de: Einstecken und Laden
    en: Plug and Charge
  Swipe Card to Start:
    de: Karte zum Starten durchziehen
    en: Swipe Card to Start
  App Start:
    de: App-Start
    en: App Start
  Timer Boost:
    de: Timer-Boost
    en: Timer Boost
  Smart Boost:
    de: Smart-Boost
    en: Smart Boost
  Unlock:
    de: Entsperren
    en: Unlock
  Lock:
