# Converted from modbus_local_gateway 'Test.yaml' by convert.py
# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: Test
  model: Test Model (DO NOT USE)
  modbus_id: 1          # prefills the "Modbus device ID" field of the config flow
  prefix: test_device   # prefills the "Entity ID prefix" field of the config flow

# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  low_byte_of_reg_8:
    address: 8
    type: uint8         # low byte of the register; bit / int8 / float16 work too
    ha:
      platform: sensor
      name: Low byte (8)
      entity_category: diagnostic
  packed_bcd_counter:
    address: 9
    type: uint8
    sum_scale: [1, 100, 10000]   # three bytes over 1.5 registers (2 are read)
    ha:
      platform: sensor
      name: Packed counter (9-10)
      precision: 0
      entity_category: diagnostic
  nibe_degree_minutes_h_11_t:
    address: 11
    type: int32
    swap: word
    multiplier: 0.1
    scan_interval: 2
    ha:
      platform: number
      min: -3000.0
      max: 3000.0
      step: 0.1
      name: Degree minutes t
      unit_of_measurement: DM
  on_off:
    address: 0
    on_value: 1
    off_value: 0
    ha:
      platform: switch
      name: Remote On/Off
      icon: mdi:power
  nibe_energy_lo:
    address: 2180
    ha:
      platform: sensor
      name: Energy LO (2180)
      precision: 0
      entity_category: diagnostic
  nibe_energy_hi:
    address: 2181
    max_change: 5
    ha:
      platform: sensor
      name: Energy HI (2181)
      precision: 0
      entity_category: diagnostic
  nibe_total_energy_i_2180:
    address: 2180
    type: float32
    swap: word_byte
    ha:
      platform: sensor
      name: Total energy
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing
      precision: 2
      entity_category: diagnostic
  hotwater_demand:
    address: 3
    on_value: 1
    mask: 0x1
    ha:
      platform: binary_sensor
      name: Heißwasser Nachfrage
      device_class: heat
      icon: mdi:water-boiler
      entity_category: diagnostic
      enabled_by_default: true
  heating_demand:
    address: 3
    on_value: 1
    mask: 0x2
    ha:
      platform: binary_sensor
      name: Heizung Nachfrage
      device_class: heat
      icon: mdi:heating-coil
      entity_category: diagnostic
      enabled_by_default: true
  antilegionella_on:
    address: 3
    on_value: 1
    mask: 0x10
    ha:
      platform: binary_sensor
      name: Antilegionellen Aktiv
      device_class: running
      icon: mdi:virus-off
      entity_category: diagnostic
      enabled_by_default: true
  register_1:
    address: 4
    on_value: 1
    mask: 0x10
    ha:
      platform: binary_sensor
      name: Boolean Register
      device_class: running

# Coils: single-bit booleans, read/write (Modbus FC01 read, FC05 write).
coil:
  coil1:
    address: 1
    ha:
      platform: switch
      name: coil1
  coil2:
    address: 1
    scan_interval: 45
    ha:
      platform: binary_sensor
      name: coil2
  coil3:
    address: 1
    on_value: false
    off_value: true
    ha:
      platform: switch
      name: coil3
  coil4:
    address: 1
    on_value: false
    off_value: true
    ha:
      platform: binary_sensor
      name: coil4

# Discrete inputs: single-bit booleans, read-only (Modbus FC02 read).
discrete:
  di1:
    address: 3
    scan_interval: 60
    ha:
      platform: binary_sensor
      name: di1
      device_class: power
