# Template entities:
#  - luftung: the ventilation unit as a fan (on/off + stage presets). The
#    Lüftungsstufe select above stays for manual control; both drive register 2,
#    so a change on one shows on the other within one poll.
#  - klima: a thermostat following Temperaturregelungsart (reads/writes whichever
#    supply/room/exhaust setpoint is active), with heat = Winter, cool = Sommer.
#    This unit exposes no room sensor, so Raum regulation shows extract-air temp.
  msensor3_co2_id_104:
    address: 5200
    groups: [modbus_config]
    ha:
      platform: sensor
      name: CO2 air qualitity modbus sensor 3
      unit_of_measurement: ppm
      device_class: carbon_dioxide
      state_class: measurement
  msensor3_rf_id_104:
    address: 5201
    groups: [modbus_config]
    ha:
      platform: sensor
      name: Relative humidity modbus sensor 3
      unit_of_measurement: "%"
      state_class: measurement
  msensor4_co2_id_105:
    address: 5202
    groups: [modbus_config]
    ha:
      platform: sensor
      name: CO2 air qualitity modbus sensor 4
      unit_of_measurement: ppm
      device_class: carbon_dioxide
      state_class: measurement
  msensor4_rf_id_105:
    address: 5203
    groups: [modbus_config]
    ha:
