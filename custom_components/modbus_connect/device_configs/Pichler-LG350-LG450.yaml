# Converted from modbus_local_gateway 'Pichler-LG350-LG450.yaml' by convert.py
# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: Pichler
  model: Lüftungsgerät LG 350 - LG 450
  max_register_read: 100
  max_read_gap: 64
  modbus_id: 20
  prefix: Pichler LG

