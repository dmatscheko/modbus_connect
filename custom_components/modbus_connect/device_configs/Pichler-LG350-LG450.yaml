      name: Lüftungsstufe
      icon: mdi:stairs
  luftungsstufe_raw:         # raw numeric handle on the stage register (addr 2);
    address: 2               # the Lüftung fan writes on/off/preset through this,
    internal: true           # since fixed turn_on/off actions need numeric values
