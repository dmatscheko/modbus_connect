# Converted from modbus_local_gateway 'Salda_RIS_MCB.yaml' by convert.py
# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: Salda
  model: RIS / RIRS (MCB)
  max_register_read: 16

# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  fan_speed_select:
    address: 0
    map:
      0: 0 - Off (Stand-by)
      1: 1 - Speed 1 (Building protection)
      2: 2 - Speed 2 (Economy)
      3: 3 - Speed 3 (Comfort)
    ha:
      platform: select
      name: Fan Speed
      icon: mdi:fan
  fan_speed_raw:             # raw numeric handle on the fan-speed register (addr 0);
    address: 0               # the Ventilation fan writes on/off/preset through this,
    internal: true           # since fixed turn_on/off actions need numeric values
  temperature_setpoint_number:
    address: 1
    ha:
      platform: number
      min: 15
      max: 30
      step: 1
      mode: box
      name: Temperature Set Point
      unit_of_measurement: °C
      device_class: temperature
      icon: mdi:thermometer

# Input registers: 16-bit words, read-only (Modbus FC04 read).
input:
  current_system_mode:
    address: 14
    map:
      0: Stand-by
      1: Building protection
      2: Economy
      3: Comfort
      4: Emergency
    ha:
      platform: sensor
      name: Current Mode
      icon: mdi:fan
      entity_category: diagnostic
  current_air_flow:
    address: 15
    ha:
      platform: sensor
      name: Current Air Flow Mode
      unit_of_measurement: ''
      icon: mdi:air-filter
  outside_temperature:
    address: 9
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Outside Temperature
      unit_of_measurement: °C
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: mdi:thermometer
  inside_temperature:
    address: 6
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Inside Temperature
      unit_of_measurement: °C
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: mdi:home-thermometer
  supply_air_temperature:
    address: 3
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Supply Air Temperature
      unit_of_measurement: °C
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: mdi:thermometer
  exhaust_air_temperature:
    address: 0
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Exhaust Air Temperature
      unit_of_measurement: °C
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: mdi:thermometer
      entity_category: diagnostic

# Template entities:
#  - ventilation: the unit as a fan (on/off + speed presets). The Fan Speed
#    select above stays for manual control; both drive register 0.
#  - thermostat: current inside temperature + the single setpoint. This unit
#    exposes no season/bypass register, so it is a plain heat setpoint (see note).
template:
  ventilation:
    ha:
      platform: fan
      name: Ventilation
    state: "{{ fan_speed_raw is not none and fan_speed_raw > 0 }}"
    preset_mode: "{{ {1: 'Building protection', 2: 'Economy', 3: 'Comfort'}.get(fan_speed_raw) }}"
    preset_modes: [Building protection, Economy, Comfort]
    turn_on: {entity: fan_speed_raw, value: 2}     # nominal (Economy)
    turn_off: {entity: fan_speed_raw, value: 0}    # Off / Stand-by
    set_preset_mode:
      entity: fan_speed_raw
      map: {Building protection: 1, Economy: 2, Comfort: 3}   # preset -> speed register value

  thermostat:
    ha:
      platform: climate
      name: Climate
    current_temperature: "{{ inside_temperature }}"
    target_temperature: "{{ temperature_setpoint_number }}"
    hvac_mode: "{{ 'heat' }}"              # no season/mode register exposed on this unit
    min_temp: 15
    max_temp: 30
    temp_step: 1
    set_temperature: {entity: temperature_setpoint_number}
