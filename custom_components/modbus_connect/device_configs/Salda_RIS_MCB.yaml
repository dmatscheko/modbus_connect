# Converted from modbus_local_gateway 'Salda_RIS_MCB.yaml'; entity groups from support/converter/Salda_RIS_MCB/augment.yaml
# Device metadata: manufacturer and model, plus optional read/poll tuning.
device:
  manufacturer: Salda
  model: RIS / RIRS (MCB)
  max_register_read: 16

# Holding registers: 16-bit words, read/write (Modbus FC03 read, FC06/FC16 write).
holding:
  fan_speed_select:
    address: 0
    map:
      0: "0 - Off (Stand-by)"
      1: "1 - Speed 1 (Building protection)"
      2: "2 - Speed 2 (Economy)"
      3: "3 - Speed 3 (Comfort)"
    ha:
      platform: select
      name: Fan Speed
      icon: "mdi:fan"
  temperature_setpoint_number:
    address: 1
    ha:
      platform: number
      min: 15
      max: 30
      step: 1
      mode: box
      name: Temperature Set Point
      unit_of_measurement: "°C"
      device_class: temperature
      icon: "mdi:thermometer"
  fan_speed_raw:
    address: 0
    internal: true

# Input registers: 16-bit words, read-only (Modbus FC04 read).
input:
  current_system_mode:
    address: 14
    map:
      0: Stand-by
      1: Building protection
      2: Economy
      3: Comfort
      4: Emergency
    ha:
      platform: sensor
      name: Current Mode
      icon: "mdi:fan"
      entity_category: diagnostic
  current_air_flow:
    address: 15
    ha:
      platform: sensor
      name: Current Air Flow Mode
      unit_of_measurement: ""
      icon: "mdi:air-filter"
  outside_temperature:
    address: 9
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Outside Temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: "mdi:thermometer"
  inside_temperature:
    address: 6
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Inside Temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: "mdi:home-thermometer"
  supply_air_temperature:
    address: 3
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Supply Air Temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: "mdi:thermometer"
  exhaust_air_temperature:
    address: 0
    type: int16
    multiplier: 0.1
    ha:
      platform: sensor
      name: Exhaust Air Temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      precision: 1
      icon: "mdi:thermometer"
      entity_category: diagnostic

# Templates: composite Home Assistant entities derived from the registers above.
template:
  thermostat:
    ha:
      platform: climate
      name: Climate
    current_temperature: "{{ inside_temperature }}"
    target_temperature: "{{ temperature_setpoint_number }}"
    hvac_mode: "{{ 'heat' }}"
    min_temp: 15
    max_temp: 30
    temp_step: 1
    set_temperature:
      entity: temperature_setpoint_number
  ventilation:
    ha:
      platform: fan
      name: Ventilation
    state: "{{ fan_speed_raw is not none and fan_speed_raw > 0 }}"
    preset_mode: "{{ {1: 'Building protection', 2: 'Economy', 3: 'Comfort'}.get(fan_speed_raw) }}"
    preset_modes: [Building protection, Economy, Comfort]
    turn_on:
      entity: fan_speed_raw
      value: 2
    turn_off:
      entity: fan_speed_raw
      value: 0
    set_preset_mode:
      entity: fan_speed_raw
      map:
        Building protection: 1
        Economy: 2
        Comfort: 3
