# Generated from homeassistant-solax-modbus by solax_convert.py — review before use.
device:
  manufacturer: SolaX Power
  model: X3-Hybrid G4
  max_register_read: 100
  max_read_gap: 64
  scan_interval: 30
  prefix: Solax X3-Hybrid
  sw_version: "DSP {{ firmware_dsp // 100 }}.{{ '%02d' | format(firmware_dsp % 100) }} ARM {{ firmware_arm // 100 }}.{{ '%02d' | format(firmware_arm % 100) }}"
  hw_version: Gen4
  serial_number: "{{ serial }}"

holding:
  lock_state:
    address: 0
    map:
      0: Locked
      2014: Unlocked
      6868: Unlocked - Advanced
    read_register: "{{ lock_state_readback }}"
    ha:
      platform: select
      name: Lock State
      icon: "mdi:lock-question"
  serial:
    address: 0
    type: string
    count: 7
    swap: byte
    internal: true
  sync_rtc:
    address: 0
    write_value:
      - "{{ now().second }}"
      - "{{ now().minute }}"
      - "{{ now().hour }}"
      - "{{ now().day }}"
      - "{{ now().month }}"
      - "{{ now().year % 100 }}"
    ha:
      platform: button
      name: Sync RTC
      icon: "mdi:home-clock"
      entity_category: config
  manufacturer_name:
    address: 7
    type: string
    count: 7
    ha:
      platform: sensor
      name: Manufacturer
      icon: "mdi:information"
      entity_category: diagnostic
  model_number:
    address: 14
    type: string
    count: 7
    ha:
      platform: sensor
      name: Model Number
      icon: "mdi:information"
      entity_category: diagnostic
  inverter_id:
    address: 21
    ha:
      platform: sensor
      name: Inverter ID Number
      icon: "mdi:information"
      entity_category: diagnostic
  system_on:
    address: 28
    write_value: 1
    ha:
      platform: button
      name: System On
      icon: "mdi:power-on"
  system_off:
    address: 28
    write_value: 0
    ha:
      platform: button
      name: System Off
      icon: "mdi:power-off"
  safety_code:
    address: 29
    map:
      0: VDE0126
      1: VDE4105
      2: AS 4777_2020_A
      3: G98/1
      4: C10/11
      5: TOR
      6: EN50438_NL
      7: Denmark2019_W
      8: CEB
      9: CEI021
      10: NRS097_2_1
      11: VDE0126_Gr_Is
      12: UTE_C15_712
      13: IEC61727
      14: G99/1
      15: VDE0126_Gr_Co
      16: Guyana
      17: C15_712_is_50
      18: C15_712_is_60
      19: New Zealand
      20: RD1699
      21: Chile
      22: Israel
      23: Czech_PPDS_2020
      24: RD1699_Island
      25: EN50549_Poland
      26: EN50438_Portugal
      27: PEA
      28: MEA
      29: EN50549_Sweden
      30: Philippines
      31: EN50438_Slovenia
      32: Denmark2019_E
      33: EN50549_EU
      34: AS 4777_2020_B
      35: AS 4777_2020_C
      36: User-Defined
      37: EN50549_Romania
      38: CEI016
      39: ACEA
      40: Chile2021 MT_R
      41: Chile2021 MT_U
      42: Czech_2022_2
      43: G98/NI-1
      44: G99/NI-1
      45: G99/NI_Type B
      46: CQC
      47: LA_3P_380
      48: LA_3P_220
    ha:
      platform: sensor
      name: Safety code
      icon: "mdi:dip-switch"
      enabled_by_default: false
  charger_use_mode:
    address: 31
    map:
      0: Self Use Mode
      1: Feedin Priority
      2: Back Up Mode
      3: Manual Mode
      4: PeakShaving
      5: Smart Schedule
    read_register: "{{ charger_use_mode_readback }}"
    ha:
      platform: select
      name: Charger Use Mode
      icon: "mdi:dip-switch"
  manual_mode_select:
