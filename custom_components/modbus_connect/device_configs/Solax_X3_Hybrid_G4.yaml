# Computed sensors (energy-flow splits SolaX derives in code).
template:
  grid_import:
    ha:
      platform: sensor
      name: Grid import
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ [-(measured_power or 0), 0] | max }}"
  grid_export:
    ha:
      platform: sensor
      name: Grid export
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ [measured_power or 0, 0] | max }}"
  house_load:
    ha:
      platform: sensor
      name: House load
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ (inverter_power or 0) - (measured_power or 0) }}"
  battery_charge_power:
    ha:
      platform: sensor
      name: Battery charge power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ [battery_power_charge or 0, 0] | max }}"
  battery_discharge_power:
    ha:
      platform: sensor
      name: Battery discharge power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ [-(battery_power_charge or 0), 0] | max }}"
  bms_max_charge:
    ha:
      platform: sensor
      name: BMS max charge
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ ((battery_voltage_charge or 0) * (bms_charge_max_current if bms_charge_max_current is not none else (battery_charge_max_current or 20))) | int }}"
