      16: Guyana
      17: C15_712_is_50
      18: C15_712_is_60
      19: New Zealand
      20: RD1699
      21: Chile
      22: Israel
      23: Czech_PPDS_2020
      24: RD1699_Island
      25: EN50549_Poland
      26: EN50438_Portugal
      27: PEA
      28: MEA
      29: EN50549_Sweden
      30: Philippines
      31: EN50438_Slovenia
      32: Denmark2019_E
      33: EN50549_EU
      34: AS 4777_2020_B
      35: AS 4777_2020_C
