# Generated from homeassistant-solax-modbus by solax_convert.py — review before use.
# Registers follow SolaX Modbus protocol document V1.02+; the device reports its version in the Modbus Protocol Version diagnostic sensor (holding 130).
device:
  manufacturer: SolaX Power
  model: X3-Hybrid G4
  max_register_read: 100
  max_read_gap: 64
  scan_interval: 30
  prefix: Solax X3-Hybrid
  sw_version: "DSP {{ firmware_dsp // 100 }}.{{ '%02d' | format(firmware_dsp % 100) }} ARM {{ firmware_arm // 100 }}.{{ '%02d' | format(firmware_arm % 100) }}"
  hw_version: Gen4
  serial_number: "{{ serial }}"
  default_groups: [basic]
  group_labels:
    pm_i1: Parallel mode Inverter 1
    pm_i2: Parallel mode Inverter 2
    pm_i3: Parallel mode Inverter 3

holding:
  lock_state:
    address: 0
    groups: [advanced]
    map:
      0: Locked
      2014: Unlocked
      6868: Unlocked - Advanced
    read_register: "{{ lock_state_readback }}"
    ha:
      platform: select
      name: Lock State
      icon: "mdi:lock-question"
  serial:
    address: 0
    type: string
    count: 7
    swap: byte
    internal: true
  sync_rtc:
    address: 0
    write_value:
      - "{{ now().second }}"
      - "{{ now().minute }}"
      - "{{ now().hour }}"
      - "{{ now().day }}"
      - "{{ now().month }}"
      - "{{ now().year % 100 }}"
    groups: [advanced]
    ha:
      platform: button
      name: Sync RTC
      icon: "mdi:home-clock"
      entity_category: config
  manufacturer_name:
    address: 7
    type: string
    count: 7
    groups: [advanced]
    ha:
      platform: sensor
      name: Manufacturer
      icon: "mdi:information"
      entity_category: diagnostic
  model_number:
    address: 14
    type: string
    count: 7
    groups: [advanced]
    ha:
      platform: sensor
      name: Model Number
      icon: "mdi:information"
      entity_category: diagnostic
  inverter_id:
    address: 21
    groups: [advanced]
    ha:
      platform: sensor
      name: Inverter ID Number
      icon: "mdi:information"
      entity_category: diagnostic
  system_on:
    address: 28
    write_value: 1
    groups: [advanced]
    ha:
      platform: button
      name: System On
      icon: "mdi:power-on"
  system_off:
    address: 28
    write_value: 0
    groups: [advanced]
    ha:
      platform: button
      name: System Off
      icon: "mdi:power-off"
  safety_code:
    address: 29
    map:
      0: VDE0126
      1: VDE4105
      2: AS 4777_2020_A
      3: G98/1
      4: C10/11
      5: TOR
      6: EN50438_NL
      7: Denmark2019_W
      8: CEB
      9: CEI021
      10: NRS097_2_1
      11: VDE0126_Gr_Is
      12: UTE_C15_712
      13: IEC61727
      14: G99/1
