# Computed sensors (values SolaX derives in code, rebuilt as templates).
template:
  grid_import:
    ha:
      platform: sensor
      name: Grid import
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:home-import-outline"
    state: "{{ [-(measured_power or 0), 0] | max }}"
    groups: [basic]
  grid_export:
    ha:
      platform: sensor
      name: Grid export
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:home-export-outline"
    state: "{{ [measured_power or 0, 0] | max }}"
    groups: [basic]
  house_load:
    ha:
      platform: sensor
      name: House load
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:home-lightning-bolt"
    state: "{{ (inverter_power or 0) - (measured_power or 0) + (meter_2_measured_power or 0) }}"
    groups: [advanced, home_consumption]
  house_load_alt:
    ha:
      platform: sensor
      name: House load alt
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:home-lightning-bolt"
      enabled_by_default: false
    state: "{{ (pv_power_total or 0) - (battery_power_charge or 0) - (measured_power or 0) + (meter_2_measured_power or 0) }}"
  battery_charge_power:
    ha:
      platform: sensor
      name: Battery charge power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ [battery_power_charge or 0, 0] | max }}"
    groups: [advanced]
  battery_discharge_power:
    ha:
      platform: sensor
      name: Battery discharge power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
    state: "{{ [-(battery_power_charge or 0), 0] | max }}"
    groups: [advanced]
  bms_max_charge:
    ha:
      platform: sensor
      name: BMS max charge
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:battery-charging-high"
    state: "{{ ((battery_voltage_charge or 0) * (bms_charge_max_current if bms_charge_max_current is not none else (battery_charge_max_current or 20))) | int }}"
    groups: [advanced]
  battery_voltage_cell_difference:
    ha:
      platform: sensor
      name: Battery voltage cell difference
      device_class: voltage
      state_class: measurement
      unit_of_measurement: V
      enabled_by_default: false
    state: "{{ ((cell_voltage_high or 0) - (cell_voltage_low or 0)) | round(3) }}"
  pm_total_inverter_power:
    ha:
      platform: sensor
      name: PM Total Inverter Power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:home-lightning-bolt"
    state: "{{ ((pm_activepower_l1 or 0) + (pm_activepower_l2 or 0) + (pm_activepower_l3 or 0)) | int }}"
    groups: [pm_i1, pm_i2, pm_i3]
  pm_total_pv_power:
    ha:
      platform: sensor
      name: PM Total PV Power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:solar-power"
    state: "{{ ((pm_pv_power_1 or 0) + (pm_pv_power_2 or 0)) | int }}"
    groups: [pm_i1, pm_i2, pm_i3]
  pm_total_house_load:
    ha:
      platform: sensor
      name: PM Total House Load
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:home-lightning-bolt"
    state: "{{ ((pm_activepower_l1 or 0) + (pm_activepower_l2 or 0) + (pm_activepower_l3 or 0) - (measured_power or 0)) | int }}"
    groups: [pm_i1, pm_i2, pm_i3]
  pm_total_reactive_or_apparentpower:
    ha:
      platform: sensor
      name: PM Total Reactive or ApparentPower
      device_class: apparent_power
      state_class: measurement
      unit_of_measurement: VA
      icon: "mdi:flash"
    state: "{{ ((pm_reactive_or_apparentpower_l1 or 0) + (pm_reactive_or_apparentpower_l2 or 0) + (pm_reactive_or_apparentpower_l3 or 0)) | int }}"
    groups: [pm_i1, pm_i2, pm_i3]
  pm_total_inverter_current:
    ha:
      platform: sensor
      name: PM Total Inverter Current
      device_class: current
      state_class: measurement
      unit_of_measurement: A
      icon: "mdi:current-ac"
    state: "{{ ((pm__current_l1 or 0) + (pm__current_l2 or 0) + (pm__current_l3 or 0)) | round(1) }}"
    groups: [pm_i1, pm_i2, pm_i3]
  pm_total_pv_current:
    ha:
      platform: sensor
      name: PM Total PV Current
      device_class: current
      state_class: measurement
      unit_of_measurement: A
      icon: "mdi:current-dc"
    state: "{{ ((pm_pv_current_1 or 0) + (pm_pv_current_2 or 0)) | round(1) }}"
    groups: [pm_i1, pm_i2, pm_i3]
  grid_to_battery_power:
    ha:
      platform: sensor
      name: Grid to Battery Power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:transmission-tower-export"
    state: "{{ [-(inverter_power or 0), 0] | max }}"
    groups: [grid_to_battery]
  pv_energy_1:
    ha:
      platform: sensor
      name: PV Energy 1
      device_class: energy
      state_class: total_increasing
      unit_of_measurement: kWh
      icon: "mdi:solar-power"
    state: "{{ [pv_power_1 or 0, 0] | max }}"
    integrate: trapezoidal
    groups: [solar_details]
  pv_energy_2:
    ha:
      platform: sensor
      name: PV Energy 2
      device_class: energy
      state_class: total_increasing
      unit_of_measurement: kWh
      icon: "mdi:solar-power"
    state: "{{ [pv_power_2 or 0, 0] | max }}"
    integrate: trapezoidal
    groups: [solar_details]
  home_consumption_energy:
    ha:
      platform: sensor
      name: Home Consumption Energy
      device_class: energy
      state_class: total_increasing
      unit_of_measurement: kWh
      icon: "mdi:home-lightning-bolt"
    state: "{{ [(inverter_power or 0) - (measured_power or 0) + (meter_2_measured_power or 0), 0] | max }}"
    integrate: trapezoidal
    groups: [home_consumption]
  grid_power_l1:
    ha:
      platform: sensor
      name: Grid Power L1
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:transmission-tower"
    state: "{{ (((grid_voltage_l1 or 0) * (grid_current_l1 or 0) * ((grid_power_factor_l1 or 0) | abs)) / 100) | round | int }}"
    groups: [grid]
  grid_power_l2:
    ha:
      platform: sensor
      name: Grid Power L2
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:transmission-tower"
    state: "{{ (((grid_voltage_l2 or 0) * (grid_current_l2 or 0) * ((grid_power_factor_l2 or 0) | abs)) / 100) | round | int }}"
    groups: [grid]
  grid_power_l3:
    ha:
      platform: sensor
      name: Grid Power L3
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:transmission-tower"
    state: "{{ (((grid_voltage_l3 or 0) * (grid_current_l3 or 0) * ((grid_power_factor_l3 or 0) | abs)) / 100) | round | int }}"
    groups: [grid]
  grid_power:
    ha:
      platform: sensor
      name: Grid Power
      device_class: power
      state_class: measurement
      unit_of_measurement: W
      icon: "mdi:transmission-tower"
    state: "{{ (((grid_voltage_l1 or 0) * (grid_current_l1 or 0) * ((grid_power_factor_l1 or 0) | abs) + (grid_voltage_l2 or 0) * (grid_current_l2 or 0) * ((grid_power_factor_l2 or 0) | abs) + (grid_voltage_l3 or 0) * (grid_current_l3 or 0) * ((grid_power_factor_l3 or 0) | abs)) / 100) | round | int }}"
    groups: [grid]
  rtc:
    ha:
      platform: sensor
      name: RTC
      icon: "mdi:clock"
      entity_category: diagnostic
      enabled_by_default: false
    state: "{{ '20%02d-%02d-%02d %02d:%02d:%02d' | format(rtc_year, rtc_month, rtc_day, rtc_hour, rtc_minute, rtc_second) }}"
