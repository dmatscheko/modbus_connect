# Templates: composite Home Assistant entities derived from the registers above.
template:
  hot_water:
    ha:
      platform: climate
      name: Warmwasser
    groups: [basic]
    current_temperature: "{{ hot_water_temp }}"
    target_temperature: "{{ hot_water_fixed_target }}"
    hvac_mode: "{{ 'heat' }}"
    hvac_action: "{{ 'heating' if key('operation_status') == 4 else 'idle' }}"
    min_temp: 18
    max_temp: 60
    temp_step: 1
    set_temperature:
      entity: hot_water_fixed_target
  heating:
    ha:
      platform: climate
      name: Heizung
    groups: [basic]
    current_temperature: "{{ flow_temp }}"
    target_temperature: "{{ heating_fixed_target }}"
    hvac_mode: "{{ 'off' if key('operating_mode') == 0 else 'heat' }}"
    hvac_action: "{{ 'heating' if key('operation_status') == 2 else 'idle' }}"
    min_temp: 18
    max_temp: 60
    temp_step: 1
    set_temperature:
      entity: heating_fixed_target
    set_hvac_mode:
      entity: operating_mode
      map:
        heat: Auto
        "off": Sommer

