      icon: mdi:hvac
      entity_category: diagnostic
      enabled_by_default: true
  relay7_ventilator:
    address: 14
    'on': 1
    mask: 0x1
    ha:
      platform: binary_sensor
      name: 'Relais 7: Ventilator'
      icon: mdi:fan
      entity_category: diagnostic
      enabled_by_default: true
  status:
    address: 16
    # Hand-repaired after conversion: the old file used bit MASKS as flag
    # keys (1, 2, 4, ..., 32768), which the old 1-indexed format silently
    # misread. These are the intended bit numbers (0-indexed).
    flags:
      0: Aus
      1: Betriebsbereit
      2: In Betrieb
      3: Legionellenmodus
      5: Legionellenmodus-Ende
      6: Abtau
      7: Abtau-Ende
      8: Störung
      9: Boost
      10: WP Gesperrt
      11: Ferien
      12: SG-ENABLED
      13: PV-WP
      14: PV-EL
      15: PV-WP+EL
    ha:
      platform: sensor
      name: Status
      icon: mdi:information-outline
      entity_category: diagnostic
      enabled_by_default: true
  holyday_remaining_days:
    address: 17
    ha:
      platform: sensor
      name: 'Abwesenheit: Verbleibend'
      unit_of_measurement: Tag/e
      device_class: duration
      state_class: measurement
      icon: mdi:calendar-clock
      entity_category: diagnostic
      enabled_by_default: false
  alarm:
    address: 18
    # Hand-repaired after conversion: the old file already used 0-indexed
    # bit numbers (which the old 1-indexed format misread by one bit).
    flags:
      0: 'Speicherfühler: Kurzschluss'
      1: 'Speicherfühler: Unterbrechung'
      2: 'Verdampferfühler: Kurzschluss'
      3: 'Verdampferfühler: Unterbrechung'
      4: 1ste Pressostat Meldung
      5: Pressostat Störung
      6: Anode kontrollieren
      7: Legio Temperatur nicht erreicht
      8: Uhrzeit einstellen!
    ha:
      platform: sensor
      name: Unit Alarm
      icon: mdi:alert-circle
      entity_category: diagnostic
      enabled_by_default: false
  alarm_raw:
    address: 18
    ha:
      platform: sensor
      name: Unit Alarm (raw)
      icon: mdi:alert-circle-outline
      entity_category: diagnostic
      enabled_by_default: false
  fw_version:
    address: 119
    multiplier: 1
    ha:
      platform: sensor
      name: FW Version
      precision: 0
      icon: mdi:chip
      entity_category: diagnostic
      enabled_by_default: true
