# SonarCloud Automatic Analysis configuration.
#
# Automatic Analysis reads exactly this file (.sonarcloud.properties in the
# repository root). A sonar-project.properties is only read by scanner-based
# analysis — the one this repo used to carry (in support/, where no analysis
# mode ever looked) was documentation only and has been folded in here.
#
# Only custom_components/ is shipped to users. converter/ (a one-shot
# migration CLI) and support/ (brand-asset build and the Modbus debugging
# CLI) are local developer tooling: operating on developer-supplied paths and
# addresses is their entire purpose, which the path-injection and
# hardcoded-address rules flag by design — so they stay out of analysis.
#
# Automatic Analysis cannot ignore individual rules from this file. If these
# come up, they are deliberate and need an "Accept" in the SonarCloud UI:
# - githubactions:S7637 (pin actions to a SHA): hassfest and the HACS
#   validator are living validators without releases, documented to be used
#   from master/main; a pinned SHA would freeze Home Assistant's validation
#   rules and silently rot (see the comments in the workflows).
# - python:S7503 (async function without await): Home Assistant's entry
#   points (async_setup_entry, diagnostics, ...) must be coroutines per the
#   HA API even when their body needs no await; the tests' fake-client
#   methods must be async to be awaitable stand-ins.
# - python:S1244 (float equality): the tests assert exact decoded register
#   values on purpose — the codec guarantees bit-exact symmetric conversions,
#   so an approximate comparison would weaken exactly the property under test.
sonar.sources=custom_components
sonar.tests=tests
sonar.exclusions=converter/**,support/**
