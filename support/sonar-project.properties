# SonarCloud configuration for Modbus Connect.

sonar.projectKey=dmatscheko_modbus_connect
sonar.organization=dmatscheko

# Only custom_components/ is shipped to users. converter/ (a one-shot
# migration CLI) and support/ (brand-asset build and the Modbus debugging
# CLI) are local developer tooling: operating on developer-supplied paths and
# addresses is their entire purpose, which the path-injection rules
# (pythonsecurity:S8707) flag by design.
sonar.sources=custom_components,.github
sonar.tests=tests
sonar.exclusions=converter/**,support/**
sonar.python.version=3.14

# Deliberate, documented exceptions kept out of the rating:
sonar.issue.ignore.multicriteria=e1,e2,e3

# githubactions:S7637 wants actions pinned to a full commit SHA. hassfest and
# the HACS validator are living validators without releases, documented to be
# used from master/main; a pinned SHA would freeze Home Assistant's
# validation rules and silently rot (see the comments in the workflows).
sonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.e1.resourceKey=.github/workflows/**

# python:S7503 ("async function without await"): Home Assistant's entry
# points (async_setup_entry, async_get_config_entry_diagnostics, ...) must be
# coroutines per the HA API even when their body needs no await, and the
# tests' fake-client methods must be async to be awaitable stand-ins.
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py

# python:S1244 (float equality): the tests assert exact decoded register
# values on purpose — the codec guarantees bit-exact symmetric conversions,
# so an approximate comparison would weaken exactly the property under test.
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
