# Shared translation memory — translate each source string once, here, and it is
# applied to every generated device config that uses it. The generator (augment.py:
# resolve_translations) collects the human-facing strings each device actually uses
# (model, group labels, map/flag values) and emits only those, so no device file
# carries a translation it does not need.
#
# Keyed by the *source string* exactly as it appears in the generated config. Each
# entry lists every language (including the source language, for clarity). A device's
# own support/converter/<device>/augment.yaml `translations:` block OVERRIDES an entry
# here, per language — use that to fix a translation that is wrong for one device.
#
# The generator warns (per device, on stderr) about used strings that have no entry
# here or in the device's augment.yaml — that list is the to-do for extending this file.
#
# NOTE: because a translated map/flag value changes what templates see, templates must
# compare the stable map key via key('entity') == N, never the label. See the converter
# README and Dimplex-SI-11TU/augment.yaml for worked examples.

# Device models are device-specific (each is used by one config), so they live in
# that device's augment.yaml translations: block, not here.

