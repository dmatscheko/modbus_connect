ops:
  # --- curated registers --------------------------------------------------- #
  # A raw copy of the ventilation-stage register, written through the fan template.
  - add: {table: holding, key: luftungsstufe_raw, after: luftungsstufe_select,
          address: 2, groups: [basic], internal: true}
  # The single "filter timer" select is presented as two explicit buttons instead.
  - remove: true
    where: {key: filter_timer_control}
  - add: {table: holding, key: filter_reset_button, after: raumtemperaturfuhler_select,
          address: 33, write_value: 1, groups: [basic],
          ha: {platform: button, name: Filter zurücksetzen, icon: "mdi:timer-refresh-outline",
               entity_category: config}}
  - add: {table: holding, key: filter_snooze_button, after: filter_reset_button,
          address: 33, write_value: 2, groups: [basic],
          ha: {platform: button, name: Filter später erinnern, icon: "mdi:alarm-snooze",
               entity_category: config}}

  # --- composite Home Assistant entities ----------------------------------- #
  - add:
      table: template
      key: luftung
      groups: [basic]
      ha: {platform: fan, name: Lüftung}
      state: "{{ luftungsstufe_raw is not none and luftungsstufe_raw > 0 }}"
      preset_mode: "{{ {1: 'Stufe 1', 2: 'Stufe 2', 3: 'Stufe 3', 4: 'Grundlüftung'}.get(luftungsstufe_raw) }}"
      preset_modes: [Grundlüftung, Stufe 1, Stufe 2, Stufe 3]
      turn_on: {entity: luftungsstufe_raw, value: 2}
      turn_off: {entity: luftungsstufe_raw, value: 0}
      set_preset_mode:
        entity: luftungsstufe_raw
        map: {Grundlüftung: 4, Stufe 1: 1, Stufe 2: 2, Stufe 3: 3}
  - add:
      table: template
      key: klima
      groups: [basic]
      ha: {platform: climate, name: Klima}
      current_temperature: |-
        {{ {'Zuluft': temperatur_zuluft,
            'Raum': temperatur_abluft,
            'Abluft': temperatur_abluft}.get(temperaturregelungsart_select) }}
      target_temperature: |-
        {{ {'Zuluft': soll_zulufttemperatur_number,
            'Raum': soll_raumlufttemperatur_number,
            'Abluft': soll_ablufttemperatur_number}.get(temperaturregelungsart_select) }}
      # Compare the stable map key (betriebsmodus 1 = Sommer), not the label, so this
      # survives translating the enum text (see _common/translations.yaml).
      # aktuelle_luftungsstufe is a template value (no map), so its labels stay literal
      # and must not be translated.
      hvac_mode: "{{ 'cool' if key('betriebsmodus_sommer_winter_select') == 1 else 'heat' }}"
      hvac_action: |-
        {{ 'idle' if aktuelle_luftungsstufe not in ['Stufe 1', 'Stufe 2', 'Stufe 3', 'Grundlüftung']
           else ('cooling' if key('betriebsmodus_sommer_winter_select') == 1 else 'heating')
                if bypassklappe_status
           else 'fan' }}
      min_temp: 15
      max_temp: 30
      temp_step: 0.5
      set_temperature:
        by: "{{ temperaturregelungsart_select }}"
        cases:
          Zuluft: {entity: soll_zulufttemperatur_number}
          Raum: {entity: soll_raumlufttemperatur_number}
          Abluft: {entity: soll_ablufttemperatur_number}
      set_hvac_mode:
        entity: betriebsmodus_sommer_winter_select
        map: {heat: Winter, cool: Sommer}

  # --- grouping ------------------------------------------------------------ #
  # Everyday view — the curated base entities and the composite templates.
  - group: [basic]
    where:
      key:
        - betriebsmodus_sommer_winter_select
        - luftungsstufe_select
        - luftungsstufe_raw
        - ewt_sommer_number
        - ewt_winter_number
        - temperaturregelungsart_select
        - volumenstrom_luftungsstufe_1_number
        - volumenstrom_luftungsstufe_2_number
        - volumenstrom_luftungsstufe_3_number
        - volumenstrom_grundluftung_number
        - h2_temperatureinstellung_vhr_number
        - soll_zulufttemperatur_number
        - soll_raumlufttemperatur_number
        - soll_ablufttemperatur_number
        - filter_tauschintervall_stunden_number
        - ext_e2_luftstufe3_nachlaufzeit_number
        - raumtemperaturfuhler_select
        - filter_reset_button
        - filter_snooze_button
        - konfiguration_luftungsstufe_select
        - bedieneinheit_fehlerausgabe_select
        - co2_regelung_select
        - co2_sollwert_number
        - luftfeuchtigkeit_regelung_select
        - luftfeuchtigkeit_sollwert_number
        - feuchte_regelung_ls3_max_zeit_number
        - sommer_winter_zeitumstellung_select
        - bypassklappe_select
        - soll_zulufttemperatur_abgesenkt_number
        - soll_raumlufttemperatur_abgesenkt_number
        - soll_ablufttemperatur_abgesenkt_number
        - system_reset_select
        - vorheizregister_target_number
        - automatische_umschaltung_sommer_winter
        - para_max_zeit_luftungsstufe_3_number
        - abluftbalance_stufe1_number
        - abluftbalance_stufe2_number
        - abluftbalance_stufe3_number
        - abluftbalance_grundluftung_number
        - freigabe_heizen_select
        - freigabe_kuhlen_select
        - zul_kanaldruck_stufe_1_number
        - zul_kanaldruck_stufe_2_number
        - zul_kanaldruck_stufe_3_number
        - zul_kanaldruck_grundluftung_number
        - abl_kanaldruck_stufe_1_number
        - abl_kanaldruck_stufe_2_number
        - abl_kanaldruck_stufe_3_number
        - abl_kanaldruck_grundluftung_number
        - zeitprogramm_luftungsstufen_select
        - zeitprogramm_temperaturregelung_select
        - l5_ai1_co2_sensor
        - l7_ai2_rf_sensor
        - t6_zuluft_extern
        - t7_aussen_extern
        - t8_raum_extern
        - t9_touch_display
        - mischer_heizen_0_10v
        - mischer_kuhlen_0_10v
        - aussentemperatur_gedaempft
        - relais_h2_vorheizregister
        - relais_h3_heizanforderung
        - relais_h5_kuhlanforderung
        - relais_h67_ventilatoren
        - bypassklappe_status
        - relais_h9_luftklappen
        - firmware_version
        - lg_modell
        - mischer_kombi_0_10v
        - relais_h10_heizpumpe
        - relais_h11_kuhlpumpe
        - summenstoermeldung
        - temperatur_aussenluft
        - temperatur_fortluft
        - temperatur_abluft
        - temperatur_zuluft
        - temperatur_vorheizregister
        - e1_din_extern_aus_bmz
        - e2_din_extern_luftstufe3
        - drehzahl_zuluft
        - drehzahl_abluft
        - relais_h12b_filtermeldung
        - zuluft_volumenstrom_sollwert
        - abluft_volumenstrom_sollwert
        - msensor1_co2
        - msensor1_rf
        - zuluft_volumenstrom_istwert
        - abluft_volumenstrom_istwert
        - betriebsstatus
        - filter_reststandzeit
        - zuluft_temperatursollwert_berechnet
        - co2_regelsignal
        - vorheizregister_pwm
        - aktuelle_luftungsstufe
        - fehler_ewt
        - fehler_bedieneinheit
        - fehler_frostschutz_nhr
        - fehler_fortluftventilator
        - fehler_zuluftventilator
        - fehler_t1_aussenluft
        - fehler_t2_fortluft
        - fehler_t3_abluft
        - fehler_t4_zuluft
        - fehler_t5_vorheizregister
        - fehler_t6_zuluft_extern
        - fehler_t7_aussenluft_extern
        - fehler_t8_raum_extern
        - fehler_ventilatoren_kommunikation
        - fehler_niedrige_zuluft_temperatur
        - fehler_filtermeldung
        - fehler_niedrige_vhr_temperatur
        - fehler_nhr_frostschutz
        - betriebsstunden_luftungsstufe_2
        - betriebsstunden_luftungsstufe_3
        - betriebsstunden_grundluftung
        - betriebsstunden_luftungsbetrieb_gesamt
        - betriebsstunden_heizregister
        - betriebsstunden_bypass
        - betriebsstunden_luftungsstufe_1
        - fehler_modbus_sensoren
        - co2_sensor_1
        - co2_sensor_2
        - feuchtesensor_1
        - feuchtesensor_2
        - msensor2_co2
        - msensor2_rf
        - l7_ai4_abluft_extern
        - firmware_version_touch_display
        - e3_din_frostschutz
        - raumsoll_zeitprogramm_status
        - luftungsstufe_zeitprogramm
        - luftung
        - klima

  # Feature groups: first matching rule wins (each gated so base entities and raw
  # internals are never re-classified). Match is a regex over the entity's raw name.
  - group: [modbus_config]
    where: {raw_name_matches: 'Modbus', missing_group: true, not_tag: internal}
  - group: [co2_control]
    where: {raw_name_matches: 'CO2|EPB|Luftqualit(ä|ae)t', missing_group: true, not_tag: internal}
  - group: [humidity_control]
    where: {raw_name_matches: 'Feuchte|humidity|\brF\b|Hum_|Luftfeucht', missing_group: true, not_tag: internal}
  - group: [summer_night_cooling]
    where: {raw_name_matches: 'Sommernacht|SummerNightCool|Nachtk(ü|ue)hl', missing_group: true, not_tag: internal}
  - group: [heat_exchanger]
    where: {raw_name_matches: 'EWT|Erdw(ä|ae)rme|Geothermal|Bypass', missing_group: true, not_tag: internal}
  - group: [preheater]
    where: {raw_name_matches: 'Nachheiz|Vorheiz|Heizregister|heater|\bSSR\b', missing_group: true, not_tag: internal}
  - group: [defrost]
    where: {raw_name_matches: 'Abtau|defrost|Frost|Enteis', missing_group: true, not_tag: internal}
  - group: [external_sensors]
    where: {raw_name_matches: 'MSensor|extern|Modbussensor|Modbus sensor|\bT[6-9]_', missing_group: true, not_tag: internal}
  - group: [filter]
    where: {raw_name_matches: 'Filter', missing_group: true, not_tag: internal}
  - group: [fan_control]
    where: {raw_name_matches: 'Luftstufe|L(ü|ue)ftungsstufe|Grundl(ü|ue)ftung|Ventilator|\bFan\b|Volumenstrom|Druck|0[_-]10V|Mischer|Mixing valve|Damper|Klappe|Relais', missing_group: true, not_tag: internal}
  - group: [firmware]
    where: {raw_name_matches: 'Firmware|FW_Version|LG_Modell|Version', missing_group: true, not_tag: internal}

  # Everything else documented -> advanced; raw internals stay ungrouped (expert tier).
  - group: [advanced]
    where: {missing_group: true, not_tag: internal}

  # --- source-string fixes (typos / stray chars) ------------------------- #
  # fix: 'CO2 air qualitity modbus sensor 3' -> 'CO2 air quality modbus sensor 3'
  - set:
      ha:
        name: CO2 air quality modbus sensor 3
