        - abluft_volumenstrom_sollwert
        - msensor1_co2
        - msensor1_rf
        - zuluft_volumenstrom_istwert
        - abluft_volumenstrom_istwert
        - betriebsstatus
        - filter_reststandzeit
        - zuluft_temperatursollwert_berechnet
        - co2_regelsignal
        - vorheizregister_pwm
        - aktuelle_luftungsstufe
        - fehler_ewt
        - fehler_bedieneinheit
        - fehler_frostschutz_nhr
        - fehler_fortluftventilator
        - fehler_zuluftventilator
        - fehler_t1_aussenluft
        - fehler_t2_fortluft
        - fehler_t3_abluft
        - fehler_t4_zuluft
        - fehler_t5_vorheizregister
        - fehler_t6_zuluft_extern
        - fehler_t7_aussenluft_extern
        - fehler_t8_raum_extern
