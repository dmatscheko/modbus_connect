        - betriebsstunden_luftungsstufe_3
        - betriebsstunden_grundluftung
        - betriebsstunden_luftungsbetrieb_gesamt
        - betriebsstunden_heizregister
        - betriebsstunden_bypass
        - betriebsstunden_luftungsstufe_1
        - fehler_modbus_sensoren
        - co2_sensor_1
        - co2_sensor_2
        - feuchtesensor_1
        - feuchtesensor_2
        - msensor2_co2
        - msensor2_rf
        - l7_ai4_abluft_extern
        - firmware_version_touch_display
        - e3_din_frostschutz
        - raumsoll_zeitprogramm_status
        - luftungsstufe_zeitprogramm
        - luftung
        - klima

  # Feature groups: first matching rule wins (each gated so base entities and raw
  # internals are never re-classified). Match is a regex over the entity's raw name.
  - group: [modbus_config]
    where: {raw_name_matches: 'Modbus', missing_group: true, not_tag: internal}
  - group: [co2_control]
    where: {raw_name_matches: 'CO2|EPB|Luftqualit(ä|ae)t', missing_group: true, not_tag: internal}
  - group: [humidity_control]
    where: {raw_name_matches: 'Feuchte|humidity|\brF\b|Hum_|Luftfeucht', missing_group: true, not_tag: internal}
  - group: [summer_night_cooling]
    where: {raw_name_matches: 'Sommernacht|SummerNightCool|Nachtk(ü|ue)hl', missing_group: true, not_tag: internal}
  - group: [heat_exchanger]
    where: {raw_name_matches: 'EWT|Erdw(ä|ae)rme|Geothermal|Bypass', missing_group: true, not_tag: internal}
  - group: [preheater]
    where: {raw_name_matches: 'Nachheiz|Vorheiz|Heizregister|heater|\bSSR\b', missing_group: true, not_tag: internal}
  - group: [defrost]
    where: {raw_name_matches: 'Abtau|defrost|Frost|Enteis', missing_group: true, not_tag: internal}
  - group: [external_sensors]
    where: {raw_name_matches: 'MSensor|extern|Modbussensor|Modbus sensor|\bT[6-9]_', missing_group: true, not_tag: internal}
  - group: [filter]
    where: {raw_name_matches: 'Filter', missing_group: true, not_tag: internal}
  - group: [fan_control]
    where: {raw_name_matches: 'Luftstufe|L(ü|ue)ftungsstufe|Grundl(ü|ue)ftung|Ventilator|\bFan\b|Volumenstrom|Druck|0[_-]10V|Mischer|Mixing valve|Damper|Klappe|Relais', missing_group: true, not_tag: internal}
  - group: [firmware]
    where: {raw_name_matches: 'Firmware|FW_Version|LG_Modell|Version', missing_group: true, not_tag: internal}

  # Everything else documented -> advanced; raw internals stay ungrouped (expert tier).
  - group: [advanced]
    where: {missing_group: true, not_tag: internal}
