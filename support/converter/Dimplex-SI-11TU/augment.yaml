# Augmentation policy for Dimplex Sole/Wasser-Wärmepumpe SI 11TU.
#
# The device is regenerated from source: the modbus_local_gateway upstream config
# supplies the curated base registers, and the Dimplex NWPM datapoint list supplies
# every other documented register. This file carries all the *policy* on top of
# those facts — device tuning, the composite climate templates, the Sync-clock
# button, the handful of base-sensor preset fixes, and the entity grouping.
# Regenerate:  python support/converter/dimplex_pichler/dimplex_pichler-convert.py

device:
  prefix: Dimplex SI
  max_register_read: 100
  max_read_gap: 64
  default_groups: [basic]
  group_labels:
    schedule: Schedule / time program
    clock: Clock
    heating_circuit_2: Heating circuit 2
    heating_circuit_3: Heating circuit 3
    cooling: Cooling
    solar: Solar
    ventilation: Ventilation
    room_climate: Room climate sensors
    smart_grid: Smart Grid
    hot_water: Hot water (extra)
    energy: "Energy & runtime"
    heat_source: Heat source (brine)
    status: Component status

# Multi-language text, keyed by the source string as it appears elsewhere in the
# generated file. The integration picks Home Assistant's configured language and
# falls back to English, then to the source string — so untranslated strings (most
# of this German-sourced device, for now) simply stay as written. This is a starter
# catalog: the German model, the English group labels, and the writable operating-mode
# enum. Extending it to the remaining entity names and status enums is incremental and
# safe — templates already compare the stable map key via key(), not the label.
translations:
  # Device model (German source -> English).
  Sole/Wasser-Wärmepumpe SI 11TU:
    de: Sole/Wasser-Wärmepumpe SI 11TU
    en: Brine/water heat pump SI 11TU
  # Group-switch labels (English source -> German).
  Schedule / time program: {en: Schedule / time program, de: Zeitplan / Zeitprogramm}
  Clock: {en: Clock, de: Uhr}
  Heating circuit 2: {en: Heating circuit 2, de: Heizkreis 2}
  Heating circuit 3: {en: Heating circuit 3, de: Heizkreis 3}
  Cooling: {en: Cooling, de: Kühlung}
  Solar: {en: Solar, de: Solar}
  Ventilation: {en: Ventilation, de: Lüftung}
  Room climate sensors: {en: Room climate sensors, de: Raumklimasensoren}
  Smart Grid: {en: Smart Grid, de: Smart Grid}
  Hot water (extra): {en: Hot water (extra), de: Warmwasser (extra)}
  Energy & runtime: {en: Energy & runtime, de: Energie & Laufzeit}
  Heat source (brine): {en: Heat source (brine), de: Wärmequelle (Sole)}
  Component status: {en: Component status, de: Komponentenstatus}
  # operating_mode enum (German source -> English). The heizung template compares its
  # key(), and set_hvac_mode's map values are translated in lockstep with this map.
  Sommer: {de: Sommer, en: Summer}
  Auto: {de: Auto, en: Automatic}
  Urlaub: {de: Urlaub, en: Holiday}
  Party: {de: Party, en: Party}
  "2.Wärmeerzeuger": {de: "2.Wärmeerzeuger", en: 2nd heat generator}
  Kühlen: {de: Kühlen, en: Cooling}

ops:
  # --- base-sensor preset fixes -------------------------------------------- #
  # The upstream base leaves °C sensors with a raw display precision; the shipped
  # config gives them the standard temperature preset instead.
  - set: {ha: {device_class: temperature, state_class: measurement}}
    where: {tag_all: ['unit:°C', 'source:mlg'], platform: sensor}
  - unset: [ha.precision]
    where: {tag_all: ['unit:°C', 'source:mlg'], platform: sensor}
  # Runtime counters (hours) accumulate — total_increasing, not measurement.
  - set: {ha: {state_class: total_increasing}}
    where: {key_matches: '_hours$', tag: 'source:mlg'}

  # --- curated registers the source can't produce mechanically ------------- #
  # The heating-circuit loop temperatures are documented as float16 but the WPM
  # reports them as uint16 ×0.1; re-add them cleanly (dropping the raw doc rows).
  - remove: true
    where: {raw_name_matches: '[23]\.\s*Heizkreis', table: input, tag: 'source:doc'}
  - add: {table: input, key: test_temp_what_is_this, before: outside_temp, address: 8, multiplier: 0.1, groups: [basic],
          ha: {platform: sensor, name: TEST What is this, unit_of_measurement: "°C",
               device_class: temperature, state_class: measurement, icon: "mdi:thermometer"}}
  - add: {table: input, key: heating_1st_loop_temp, after: heating_return_temp, address: 27, multiplier: 0.1, groups: [basic],
          ha: {platform: sensor, name: "1. Heizkreis Temperatur (R5)", unit_of_measurement: "°C",
               device_class: temperature, state_class: measurement, icon: "mdi:thermometer"}}
  - add: {table: input, key: heating_1st_loop_return_target, after: heating_return_target, address: 29, multiplier: 0.1, groups: [basic],
          ha: {platform: sensor, name: "1. Heizkreis Rücklaufsolltemperatur", unit_of_measurement: "°C",
               device_class: temperature, state_class: measurement, icon: "mdi:thermometer"}}
  - add: {table: input, key: heating_2nd_loop_temp, after: heating_1st_loop_temp, address: 9, multiplier: 0.1, groups: [basic],
          ha: {platform: sensor, name: "2. Heizkreis Temperatur (R?)", unit_of_measurement: "°C",
               device_class: temperature, state_class: measurement, icon: "mdi:thermometer",
               enabled_by_default: false}}
  - add: {table: input, key: heating_2nd_loop_return_target, after: heating_1st_loop_return_target, address: 54, multiplier: 0.1, groups: [basic],
          ha: {platform: sensor, name: "2. Heizkreis Rücklaufsolltemperatur", unit_of_measurement: "°C",
               device_class: temperature, state_class: measurement, icon: "mdi:thermometer",
               enabled_by_default: false}}
  - add: {table: input, key: heating_3rd_loop_temp, after: heating_2nd_loop_temp, address: 10, multiplier: 0.1, groups: [basic],
          ha: {platform: sensor, name: "3. Heizkreis Temperatur (R13)", unit_of_measurement: "°C",
               device_class: temperature, state_class: measurement, icon: "mdi:thermometer",
               enabled_by_default: false}}
  - add: {table: input, key: heating_3rd_loop_return_target, after: heating_2nd_loop_return_target, address: 55, multiplier: 0.1, groups: [basic],
          ha: {platform: sensor, name: "3. Heizkreis Rücklaufsolltemperatur", unit_of_measurement: "°C",
               device_class: temperature, state_class: measurement, icon: "mdi:thermometer",
               enabled_by_default: false}}

  # One-click clock sync: writes the 6 value registers 5006-5011 (hour..year) in
  # one FC16, alongside the individual editable clock fields the source produced.
  - add: {table: holding, key: sync_clock, after: smart_grid, address: 5006, groups: [clock],
          write_value: ['{{ now().hour }}', '{{ now().minute }}', '{{ now().month }}',
                        '{{ now().isoweekday() }}', '{{ now().day }}', '{{ now().year % 100 }}'],
          ha: {platform: button, name: Sync clock, icon: "mdi:clock-check", entity_category: config}}

  # --- template-source registers ------------------------------------------- #
  # The fixed-target setpoints are written through the climate templates below, so
  # they are internal (no standalone entity of their own).
  - set: {internal: true}
    where: {key: [heating_fixed_target, hot_water_fixed_target]}
  - unset: [ha]
    where: {key: [heating_fixed_target, hot_water_fixed_target]}

  # --- composite Home Assistant entities ----------------------------------- #
  - add:
      table: template
      key: warmwasser
      groups: [basic]
      ha: {platform: climate, name: Warmwasser}
      current_temperature: "{{ hot_water_temp }}"
      target_temperature: "{{ hot_water_fixed_target }}"
      hvac_mode: "{{ 'heat' }}"
      # key('operation_status') is the stable map key (4 = Warmwasser), so the test
      # survives translating the status label; comparing the label would not.
      hvac_action: "{{ 'heating' if key('operation_status') == 4 else 'idle' }}"
      min_temp: 18
      max_temp: 60
      temp_step: 1
      set_temperature: {entity: hot_water_fixed_target}
  - add:
      table: template
      key: heizung
      groups: [basic]
      ha: {platform: climate, name: Heizung}
      current_temperature: "{{ flow_temp }}"
      target_temperature: "{{ heating_fixed_target }}"
      # Compare stable map keys, not labels: operating_mode 0 = Sommer, operation_status
      # 2 = Heizen. set_hvac_mode's values are still labels, but they translate in
      # lockstep with operating_mode's map, so the write keeps landing.
      hvac_mode: "{{ 'off' if key('operating_mode') == 0 else 'heat' }}"
      hvac_action: "{{ 'heating' if key('operation_status') == 2 else 'idle' }}"
      min_temp: 18
      max_temp: 60
      temp_step: 1
      set_temperature: {entity: heating_fixed_target}
      set_hvac_mode: {entity: operating_mode, map: {heat: Auto, "off": Sommer}}

  # --- grouping ------------------------------------------------------------ #
  # Everyday view — the curated base entities and the composite templates.
  - group: [basic]
    where:
      key:
        - heating_room_temperature
        - heating_hysteresis
        - operating_mode
        - heating_parallel_shift
        - heating_fixed_target
        - heating_curve_end_point
        - hot_water_hysteresis
        - hot_water_fixed_target
        - hot_water_max_fixed_target
        - external_block_software
        - hot_water_min_fixed_target
        - outside_temp
        - heating_return_temp
        - hot_water_temp
        - flow_temp
        - source_input_temp
        - source_output_temp
        - test_temp_what_is_this
        - heating_2nd_loop_temp
        - heating_3rd_loop_temp
        - heating_1st_loop_temp
        - heating_1st_loop_return_target
        - heating_return_target
        - heating_2nd_loop_return_target
        - heating_3rd_loop_return_target
        - hot_water_target
        - additional_pump_hours
        - compressor1_hours
        - primary_pump_hours
        - heating_pump_hours
        - hot_water_pump_hours
        - operation_status
        - blocking_status
        - fault_status
        - sensor_status
        - heating_energy
        - hot_water_energy
        - hot_water_thermostat
        - utility_block
        - external_block
        - compressor1
        - primary_pump
        - heating_pump
        - hot_water_pump
        - mixer_open
        - additional_pump
        - heating_pump_m15
        - mixer_m22_open
        - pool_pump
        - error_indicator
        - heating_pump_m14
        - cooling_pump
        - heating_pump_m20
        - room_thermostat_mode
        - cooling_primary_pump
        - solar_pump
        - warmwasser
        - heizung

  # Feature groups: first matching rule wins (each gated so base entities and raw
  # internals are never re-classified). Match is a regex over the entity's raw name.
  - group: [schedule]
    where: {raw_name_matches: 'Start\s+(Stunde|Minute)|Ende\s+(Stunde|Minute)|Aktiv\s*Zeit|Zeitprogramm|Schaltzeit|^(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)$', missing_group: true, not_tag: internal}
  - group: [clock]
    where: {raw_name_matches: '^(Stunde|Minute|Monat|Wochentag|Tag|Jahr)$|Uhrzeit|Sync clock', missing_group: true, not_tag: internal}
  - group: [heating_circuit_2]
    where: {raw_name_matches: 'Heizkreis\s*2|\(M21\)|2\.\s*Heizkreis', missing_group: true, not_tag: internal}
  - group: [heating_circuit_3]
    where: {raw_name_matches: 'Heizkreis\s*3|\(M22\)|3\.\s*Heizkreis', missing_group: true, not_tag: internal}
  - group: [cooling]
    where: {raw_name_matches: 'K(ü|ue)hl', missing_group: true, not_tag: internal}
  - group: [solar]
    where: {raw_name_matches: 'Solar', missing_group: true, not_tag: internal}
  - group: [ventilation]
    where: {raw_name_matches: 'L(ü|ue)ftung|Zuluft|Abluft|Fortluft|Außenluft', missing_group: true, not_tag: internal}
  - group: [room_climate]
    where: {raw_name_matches: 'Raumtemperatur|Raumfeuchte|RT-RTH', missing_group: true, not_tag: internal}
  - group: [smart_grid]
    where: {raw_name_matches: 'Smart\s*Grid|SG[- ]?Ready', missing_group: true, not_tag: internal}
  - group: [hot_water]
    where: {raw_name_matches: 'Warmwasser|Zirkulation|Legionell', missing_group: true, not_tag: internal}
  - group: [energy]
    where: {raw_name_matches: 'W(ä|ae)rmemenge|Energie|Verbrauch|Betriebsstunden|Laufzeit', missing_group: true, not_tag: internal}
  - group: [heat_source]
    where: {raw_name_matches: 'W(ä|ae)rmequelle|Prim(ä|ae)r|\bSole\b|Verdampfer', missing_group: true, not_tag: internal}
  - group: [status]
    where: {raw_name_matches: '\(M\d|\(E\d|\(N\d|\(H\d|Verdichter|Pumpe|Ventil|St(ö|oe)rung|Flanschheizung|Thermostat|W(ä|ae)rmeerzeuger', missing_group: true, not_tag: internal}

  # Everything else documented -> advanced; raw internals stay ungrouped (expert tier).
  - group: [advanced]
    where: {missing_group: true, not_tag: internal}
