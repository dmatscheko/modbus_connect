# ops: correct a few malformed source labels (typos / stray characters) before
# translation, via `set` on the affected register.
ops:
# fix: 'Mwh / kAh' -> 'MWh / kAh' (Unit-symbol typo: megawatt-hour is 'MWh', not 'Mwh' (lowercase 'w' is wrong). kAh part is already correct.)
- set:
    map:
      1: MWh / kAh
  where:
    key: unit_prefix
