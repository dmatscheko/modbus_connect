  - {de: L1 Scheinleistung, en: L1 apparent Power}
  - {de: L1 Strom, en: L1 Current}
  - {de: L1 Leistungsfaktor, en: L1 Power Factor}
  - {de: L1 Blindleistung, en: L1 reactive Power}
  - {de: L1 Spannung, en: L1 Voltage}
  - {de: L2 Wirkleistung, en: L2 active Power}
  - {de: L2 Scheinleistung, en: L2 apparent Power}
  - {de: L2 Strom, en: L2 Current}
  - {de: L2 Leistungsfaktor, en: L2 Power Factor}
  - {de: L2 Blindleistung, en: L2 reactive Power}
  - {de: L2 Spannung, en: L2 Voltage}
  - {de: L3 Wirkleistung, en: L3 active Power}
  - {de: L3 Scheinleistung, en: L3 apparent Power}
  - {de: L3 Strom, en: L3 Current}
  - {de: L3 Leistungsfaktor, en: L3 Power Factor}
