# Augmentation policy for Salda_RIS_MCB: hand-curation ported from the pre-library config
# (edits that are not in the upstream modbus_local_gateway source).

# Translations (en/de): shared cross-device vocabulary in _common/translations.yaml is
# applied automatically; the block below adds this device's own strings (each matched by
# any of a unit's language values), plus any per-device override of a shared unit.
translations:
  - {de: Aktueller Luftmengenmodus, en: Current Air Flow Mode}
  - {de: Aktueller Modus, en: Current Mode}
  - {de: Ventilatorstufe, en: Fan Speed}
  - {de: Innentemperatur, en: Inside Temperature}
  - {de: Außentemperatur, en: Outside Temperature}
  - {de: Temperatur-Sollwert, en: Temperature Set Point}

ops:
- add:
    table: holding
    key: fan_speed_raw
    address: 0
    internal: true
- add:
    table: template
    key: thermostat
    ha:
      platform: climate
      name: Climate
    current_temperature: '{{ inside_temperature }}'
    target_temperature: '{{ temperature_setpoint_number }}'
    hvac_mode: '{{ ''heat'' }}'
    min_temp: 15
    max_temp: 30
    temp_step: 1
    set_temperature:
      entity: temperature_setpoint_number
- add:
    table: template
    key: ventilation
    ha:
      platform: fan
      name: Ventilation
    state: '{{ fan_speed_raw is not none and fan_speed_raw > 0 }}'
    preset_mode: '{{ {1: ''Building protection'', 2: ''Economy'', 3: ''Comfort''}.get(fan_speed_raw) }}'
    preset_modes:
    - Building protection
    - Economy
    - Comfort
    turn_on:
      entity: fan_speed_raw
      value: 2
    turn_off:
      entity: fan_speed_raw
      value: 0
    set_preset_mode:
      entity: fan_speed_raw
      map:
        Building protection: 1
        Economy: 2
        Comfort: 3
