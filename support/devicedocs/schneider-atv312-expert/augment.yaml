  - {de: Anforderung Werkseinstellungen laden, en: Factory settings recall request}
  - {de: Hohe Auflösung aktiviert, en: High resolution enabled}
  - {de: Modbus-Kommunikationsüberwachung deaktiviert, en: Modbus communication monitoring inhibited}
  - {de: Keine Parameter-Konsistenzprüfung, en: No parameter consistency check}
  - {de: Anforderung Rampenumschaltung, en: Ramp switching request}
  - {de: AI1C Analogeingang AI1, en: AI1C Analog Input AI1}
  - {de: AI2C Analogeingang AI2, en: AI2C Analog Input AI2}
  - {de: AI3C Analogeingang AI3, en: AI3C Analog Input AI3}
  - {de: AO1R Analogausgangswert, en: AO1R Analog Output Value}
  - {de: CMI1 Modbus erweitertes Steuerabbild, en: CMI1 Modbus Extended Control Image}
  - {de: CMI2 CANopen erweitertes Steuerabbild, en: CMI2 CANopen Extended Control Image}
  - {de: Modbus-Kommunikationsformat, en: Modbus Communication Format}
