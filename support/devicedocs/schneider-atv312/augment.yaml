# ops: correct a few malformed source labels (typos / stray characters) before
# translation, via `set` on the affected register.
ops:
# fix: 'LFF 4 - 20 mA loss' -> 'LFF 4 - 20 mA loss' (Double space between 'LFF' and '4'; every sibling fault map (lft, dp1, dp2, dp3) uses a single space in the identical value)
- set:
    map:
      13: LFF 4 - 20 mA loss
  where:
    key: dp4_past_detected_fault_4
