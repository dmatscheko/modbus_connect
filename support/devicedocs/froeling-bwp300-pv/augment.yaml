ops:
- set:
    flags:
      0: 'Speicherfühler: Kurzschluss'
      1: 'Speicherfühler: Unterbrechung'
      2: 'Verdampferfühler: Kurzschluss'
      3: 'Verdampferfühler: Unterbrechung'
      4: 1. Pressostat-Meldung  # fix: German ordinal '1ste' -> '1.'
      5: Pressostat Störung
      6: Anode kontrollieren
      7: Legio Temperatur nicht erreicht
      8: Uhrzeit einstellen!
  where:
    key: alarm
- set:
    flags:
      0: Aus
      1: Betriebsbereit
      2: In Betrieb
      3: Legionellenmodus
      5: Legionellenmodus-Ende
      6: Abtau
      7: Abtau-Ende
      8: Störung
      9: Boost
      10: WP Gesperrt
      11: Ferien
      12: SG-ENABLED
      13: PV-WP
      14: PV-EL
      15: PV-WP+EL
  where:
    key: status

# --- source-string fix (typo) --------------------------------------------- #
# fix: 'Betriebsmodus: Standart' -> 'Betriebsmodus: Standard'
- set:
    ha:
      name: 'Betriebsmodus: Standard'
  where:
    key: betriebsart
