# Shared translation memory — translate each concept once, here, as a list of
# translation units. Each unit is a `{lang: text}` mapping and is matched against a
# source string by ANY of its language values, so ONE unit serves the German-sourced
# use and the English-sourced use of the same concept — no duplicate entries.
#
# The generator (augment.py: resolve_translations) collects the human-facing strings
# each device actually uses (model, group labels, map/flag values), looks each up here,
# and emits a per-device `{source: {lang: text}}` catalog containing only those. A
# device's own support/converter/<device>/augment.yaml `translations:` list OVERRIDES a
# unit here (per language) for that device; device models live there too, being
# device-specific. The generator warns about used strings still untranslated.
#
# Keep every value UNIQUE across units: because lookup matches on any value, a text that
# means two different things (e.g. English "Cooling" = the mode "Kühlen" AND the group
# "Kühlung") would be ambiguous. Here the mode is "Cool" and the group is "Cooling".
#
# NOTE: a translated map/flag value changes what templates see, so templates must compare
# the stable map key via key('entity') == N, never the label. See the README and the
# migrated climate templates in Dimplex-SI-11TU / Pichler-* augment.yaml.

