    swap: word
    scan_interval: 15
    groups: [advanced, diagnostics]
    ha:
      platform: sensor
      name: Fault Code
      icon: "mdi:alert"
      entity_category: diagnostic
  case_type:
    address: 32
    groups: [advanced, diagnostics]
    scan_interval: 15
    map:
      0: Case B
      1: Case C
    ha:
      platform: sensor
      name: Case Type
      icon: "mdi:ev-plug-type2"
      entity_category: diagnostic
  power_rating:
