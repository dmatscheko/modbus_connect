  grid_current_l2:
    address: 19
    groups: [advanced, grid]
    type: int16
    multiplier: 0.01
    scan_interval: 15
    ha:
      platform: sensor
      name: Grid Current L2
      unit_of_measurement: A
      device_class: current
      precision: 1
      entity_category: diagnostic
  grid_current_l3:
    address: 20
    groups: [advanced, grid]
    type: int16
    multiplier: 0.01
    scan_interval: 15
    ha:
      platform: sensor
      name: Grid Current L3
      unit_of_measurement: A
      device_class: current
      precision: 1
      entity_category: diagnostic
  grid_power_l1:
    address: 21
    groups: [advanced, grid]
    type: int16
    scan_interval: 15
    ha:
      platform: sensor
      name: Grid Power L1
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      entity_category: diagnostic
  grid_power_l2:
    address: 22
    groups: [advanced, grid]
    type: int16
    scan_interval: 15
    ha:
      platform: sensor
      name: Grid Power L2
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      entity_category: diagnostic
  grid_power_l3:
    address: 23
    groups: [advanced, grid]
    type: int16
    scan_interval: 15
    ha:
      platform: sensor
      name: Grid Power L3
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      entity_category: diagnostic
  grid_power_total:
    address: 24
    type: int16
    scan_interval: 15
    groups: [standard, grid]
    ha:
      platform: sensor
      name: Grid Power Total
      unit_of_measurement: W
      device_class: power
      state_class: measurement
  cc_voltage:
    address: 25
    groups: [advanced, diagnostics]
    multiplier: 0.1
    scan_interval: 15
    ha:
      platform: sensor
      name: CC Voltage
      unit_of_measurement: V
      device_class: voltage
      precision: 1
