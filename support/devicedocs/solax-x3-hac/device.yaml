      state_class: measurement
  charge_power_l2:
    address: 9
    groups: [standard, charging]
    scan_interval: 15
    ha:
      platform: sensor
      name: Charge Power L2
      unit_of_measurement: W
      device_class: power
      state_class: measurement
  charge_power_l3:
    address: 10
    groups: [standard, charging]
    scan_interval: 15
    ha:
      platform: sensor
      name: Charge Power L3
      unit_of_measurement: W
      device_class: power
      state_class: measurement
  charge_power_total:
    address: 11
    scan_interval: 15
    groups: [basic, charging]
    ha:
      platform: sensor
      name: Charge Power Total
      unit_of_measurement: W
      device_class: power
      state_class: measurement
  charge_frequency_l1:
    address: 12
    groups: [advanced, charging]
    multiplier: 0.01
    ha:
      platform: sensor
      name: Charge Frequency L1
      unit_of_measurement: Hz
      precision: 1
