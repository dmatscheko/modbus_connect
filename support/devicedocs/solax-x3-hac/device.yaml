    groups: [advanced, diagnostics]
    ha:
      platform: sensor
      name: Charger Temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      entity_category: diagnostic
  run_mode:
    address: 29
    scan_interval: 15
    groups: [standard, diagnostics]
    map:
      0: Available
      1: Preparing
      2: Charging
      3: Finishing
      4: Faulted
      5: Unavailable
      6: Reserved
      7: Suspended EV
      8: Suspended EVSE
      9: Update
      10: Card Activation
      11: Start Delay
      12: Charge Paused
      13: Stopping
