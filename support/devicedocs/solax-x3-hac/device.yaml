      device_class: voltage
      precision: 1
      entity_category: diagnostic
  charge_current_l1:
    address: 4
    multiplier: 0.01
    scan_interval: 15
    groups: [standard, charging]
    ha:
      platform: sensor
      name: Charge Current L1
      unit_of_measurement: A
      device_class: current
      precision: 1
  charge_current_l2:
    address: 5
    multiplier: 0.01
    scan_interval: 15
    groups: [standard, charging]
    ha:
      platform: sensor
      name: Charge Current L2
      unit_of_measurement: A
      device_class: current
      precision: 1
  charge_current_l3:
    address: 6
    multiplier: 0.01
    scan_interval: 15
    groups: [standard, charging]
    ha:
      platform: sensor
      name: Charge Current L3
      unit_of_measurement: A
      device_class: current
