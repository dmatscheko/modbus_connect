      entity_category: diagnostic
  cp_voltage:
    address: 26
    groups: [advanced, diagnostics]
    multiplier: 0.01
    scan_interval: 15
    ha:
      platform: sensor
      name: CP Voltage
      unit_of_measurement: V
      device_class: voltage
      precision: 1
