  phase_type:
    address: 34
    groups: [advanced, grid]
    scan_interval: 15
    map:
      0: Single Phase
      1: Three Phase
    ha:
      platform: sensor
      name: Phase Type
      icon: "mdi:sine-wave"
      entity_category: diagnostic
  model_type:
    address: 35
    scan_interval: 15
    groups: [advanced, settings]
    map:
      0: PV Mode
      1: Standard Mode
      2: OCPP Mode
    ha:
      platform: sensor
      name: Charging Scene
      icon: "mdi:dip-switch"
      entity_category: diagnostic
  screen_fitted:
    address: 36
    groups: [advanced, diagnostics]
    scan_interval: 15
    map:
      0: "No"
      1: "Yes"
    ha:
      platform: sensor
      name: Screen Fitted
      icon: "mdi:monitor"
      entity_category: diagnostic
  firmware_version:
    address: 37
    internal: true
  rssi:
    address: 39
    groups: [advanced, diagnostics]
    scan_interval: 15
    ha:
      platform: sensor
      name: RSSI
      unit_of_measurement: "%"
      icon: "mdi:wifi-strength-2"
      entity_category: diagnostic
  active_charge_phase:
    address: 40
    scan_interval: 15
    groups: [standard, charging]
    map:
      0: Three Phase
      1: L1 Phase
      2: L2 Phase
      3: L3 Phase
    ha:
      platform: sensor
      name: Active Charge Phase
      icon: "mdi:cable-data"
  unbalanced_power_limit:
    address: 41
    groups: [advanced, grid]
    scan_interval: 15
    ha:
      platform: sensor
      name: Unbalanced Power Limit
      unit_of_measurement: W
      device_class: power
      icon: "mdi:scale-unbalanced"
      entity_category: diagnostic
  phase_unbalance:
    address: 42
    groups: [advanced, grid]
    scan_interval: 15
    map:
      0: "Off"
      1: "On"
    ha:
      platform: sensor
      name: Phase Unbalance
      icon: "mdi:scale-unbalanced"
      entity_category: diagnostic
  charge_duration:
    address: 43
    type: uint32
    swap: word
    scan_interval: 15
    groups: [standard, charging]
    ha:
      platform: sensor
      name: Charging Duration
      unit_of_measurement: s
      device_class: duration
      state_class: total
      precision: 0
      icon: "mdi:timer"
  lock_state:
    address: 45
    scan_interval: 15
    groups: [advanced, diagnostics]
    map:
      0: Unlocked
      1: Locked
    ha:
      platform: sensor
      name: Lock State
      icon: "mdi:lock"
  mainbrk_limit:
    address: 46
    scan_interval: 15
    groups: [advanced, settings]
    map:
      0: Not Limited
      1: "Limited, Charging"
      2: Stopped Charging
    ha:
      platform: sensor
      name: Main Breaker Limit State
      icon: "mdi:car-speed-limiter"
  delay_state:
    address: 47
    groups: [advanced, diagnostics]
    scan_interval: 15
    map:
      0: Not in Delay
      1: In Random Delay
    ha:
      platform: sensor
      name: Random Delay State
      icon: "mdi:progress-clock"
      entity_category: diagnostic
  ban_state:
    address: 48
    scan_interval: 15
    groups: [advanced, diagnostics]
    map:
      0: Okay
      1: Charge Prohibited
    ha:
      platform: sensor
      name: Ban State
      icon: "mdi:hand-back-left"
  charge_power_l1_alt:
    address: 256
    groups: [advanced, charging]
    scan_interval: 15
    ha:
      platform: sensor
      name: Charge Power L1 Alt
      unit_of_measurement: W
      device_class: power
      state_class: measurement
  charge_power_l2_alt:
    address: 257
    groups: [advanced, charging]
    scan_interval: 15
    ha:
      platform: sensor
      name: Charge Power L2 Alt
      unit_of_measurement: W
      device_class: power
      state_class: measurement
  charge_power_l3_alt:
    address: 258
    groups: [advanced, charging]
    scan_interval: 15
    ha:
      platform: sensor
      name: Charge Power L3 Alt
      unit_of_measurement: W
      device_class: power
      state_class: measurement
  max_power_charging:
    address: 259
    scan_interval: 15
    groups: [advanced, settings]
    map:
      0: "No"
      1: "Yes"
    ha:
      platform: sensor
      name: Max Power Charging
      icon: "mdi:lightning-bolt"
      entity_category: diagnostic
  charge_mode_active:
    address: 260
    scan_interval: 15
    groups: [advanced, charging]
    map:
      0: Fast
      1: ECO
      2: Green
    ha:
      platform: sensor
      name: Charge Mode Active
      icon: "mdi:dip-switch"
  green_mode_start_power:
    address: 261
    scan_interval: 15
    groups: [advanced, settings]
    ha:
      platform: sensor
      name: Green Mode Start Power
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      icon: "mdi:solar-power"
      entity_category: diagnostic
  charger_status:
    address: 262
    groups: [standard, charging]
    scan_interval: 15
    map:
      0: Available
      1: Preparing
      2: Charging
      3: Finishing
      4: Faulted
      5: Unavailable
      6: Reserved
      7: Suspended EV
      8: Suspended EVSE
      9: Update
      10: Card Activation
      11: Start Delay
      12: Charge Paused
      13: Stopping
    ha:
      platform: sensor
      name: Run Mode Alt
      icon: "mdi:ev-station"

# Templates: composite Home Assistant entities derived from the registers above.
template:
  rtc:
    groups: [advanced, modbus_config]
    ha:
      platform: sensor
      name: RTC
      icon: "mdi:clock"
      entity_category: diagnostic
    state: "{% set tz = rtc_tz - 65536 if rtc_tz > 32767 else rtc_tz %}{{ '20%02d-%02d-%02d %02d:%02d:%02d UTC%s%02d:%02d' | format(rtc_year, rtc_month, rtc_day, rtc_hour, rtc_minute, rtc_second, '+' if tz >= 0 else '-', (tz | abs) // 60, (tz | abs) % 60) }}"

# Translations: per-language text for this device's human-facing strings (device model, group labels, entity names, map/flag values), keyed by the source string.

translations:
  Available:
    de: Verfügbar
    en: Available
  Unavailable:
    de: Nicht verfügbar
    en: Unavailable
  Preparing:
    de: Vorbereitung
    en: Preparing
  Charging:
    de: Lädt
    en: Charging
  Finishing:
    de: Wird abgeschlossen
    en: Finishing
  Faulted:
    de: Gestört
